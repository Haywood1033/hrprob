.dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.spin{background:var(--amber);animation:pulse 1s infinite}

.btn{background:transparent;border:1px solid var(--bd);color:var(--t2);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .15s}

.tabs{display:flex;gap:2px;padding:8px 20px 0;border-bottom:1px solid var(--bd);background:var(--bg)}
.tab{padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--t3);transition:all .15s}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--t1);border-bottom-color:var(--teal)}

.fbar input:focus,.fbar select:focus{border-color:var(--teal)}
.fbar input{width:170px}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);color:var(--t2);background:transparent;transition:all .15s;font-family:var(--mono)}
.chip:hover,.chip.on{background:var(--teal);color:#000;border-color:var(--teal)}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:9px 12px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--t2)}
thead th.srt{color:var(--teal)}
tbody tr{border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--bg3)}
td{padding:9px 12px;font-size:13px;vertical-align:middle;white-space:nowrap}
.rk{font-family:var(--mono);font-size:11px;color:var(--t3)}
.pn{font-weight:600;color:var(--t1)}
.pt{font-size:11px;color:var(--t3)}

.sl{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.06em}

// ── HR PROBABILITY MODEL ──
function hrProb(b,park,wx,pit,order){
  // ── BATTER BASE RATE ──────────────────────────────────────────
  // Primary drivers: Barrel% (strongest predictor), EV, xwOBA, ISO
  const barrel = b.ba  || 8;
  const ev     = b.ev  || 88;
  const xw     = b.xw  || 0.310;
  const iso    = b.iso || 0.150;
  const hh     = b.hh  || 37;   // hard hit% — secondary EV quality signal

  // Composite base: weighted toward barrel (best HR predictor)
  let p = (barrel*0.40 + (ev-85)*0.20 + (xw-0.300)*42 + iso*8 + (hh-37)*0.06) / 100;
  p = Math.max(0.02, Math.min(0.26, p));

  // ── PARK FACTOR ───────────────────────────────────────────────
  const pk = park || {f:1.0};
  p *= (pk.f || 1.0);

  // Elevation bonus (Coors ~+20%, Denver alt offense bonus)
  p += Math.min(0.025, ((pk.elev||0) - 500) / 95000);

  // ── WEATHER ───────────────────────────────────────────────────
  if (!['dome','retractable'].includes(pk.roof) && wx.ws) {
    const o = pk.orient || 180;
    const d = ((wx.wd - o) % 360 + 360) % 360;
    // Wind blowing out = +, blowing in = -
    if      (d < 45  || d > 315) p += wx.ws * 0.0009;   // out
    else if (d > 135 && d < 225) p -= wx.ws * 0.0007;   // in
    // Temperature: ball travels further in heat
    p += ((wx.t || 70) - 70) * 0.00022;
  }

  // ── PITCHER MATCHUP ───────────────────────────────────────────
  const xe    = pit.xera  || pit.era || 4.50;  // xERA: best pitcher quality metric
  const whiff = pit.whiff || 22;               // whiff%: K rate proxy
  const hr9   = pit.hr9   || 1.20;             // HR/9: pitcher HR vulnerability
  const pitHH = pit.hh    || 38;               // hard hit% against pitcher

  // xERA effect: worse pitcher = more HR
  p += (xe - 4.50) * 0.010;

  // HR/9 effect: pitcher who gives up HRs = more likely matchup
  p += (hr9 - 1.20) * 0.018;

  // Hard hit% allowed: pitch quality indicator
  p += (pitHH - 38) * 0.0008;

  // Whiff%: high K rate = fewer balls in play = slightly fewer HR
  p -= (whiff - 22) * 0.0004;

  // ── PLATOON SPLIT ─────────────────────────────────────────────
  const bats = b.bats || 'R';
  const ph   = pit.hand || 'R';
  if (bats !== 'S') {
    // Opposite-hand advantage: ~7% boost
    // Same-hand disadvantage: ~9% penalty
    p *= (bats === ph) ? 0.91 : 1.07;
  }

  // ── BATTING ORDER POSITION ────────────────────────────────────
  // Cleanup hitters (3-5) get slightly more AB with men on
  // Leadoff (1-2) and bottom (7-9) slight adjustment
  const ord = order || 5;
  if (ord >= 3 && ord <= 5) p *= 1.02;       // cleanup premium
  else if (ord >= 7)        p *= 0.97;       // bottom of order

  return Math.max(0.5, Math.min(32, p * 100));
}

// ── SAFE FETCH with timeout ──
function safeFetch(url, ms=12000){
  return new Promise((resolve,reject)=>{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>{ctrl.abort();reject(new Error('timeout'));},ms);
    fetch(url,{signal:ctrl.signal})
      .then(r=>{clearTimeout(timer);resolve(r);})
      .catch(e=>{clearTimeout(timer);reject(e);});
  });
}

function parseLineupHTML(html){
  const out={};
  const lines=html.split(/[\n\r]+/);
  let cur=null;
  for(const rawLine of lines){
    const line=rawLine.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    // Team header: "PIT Lineup" or "Pirates Lineup"
    const th=line.match(/\b([A-Z]{2,3})\s+(?:Starting\s+)?Lineup\b/i);
    if(th){const team=ABBR[th[1].toUpperCase()]||null;if(team){cur=team;if(!out[cur])out[cur]=[];}continue;}
    if(!cur)continue;
    // Numbered player line
    const m=line.match(/^(?:\*{0,2})(\d)(?:\*{0,2})\.\s+(?:\[([^\]]+)\]\([^)]*\)|([^([\n]+?))\s*(?:\(([RLS])\))?/);
    if(m){
      const num=parseInt(m[1]),name=(m[2]||m[3]||'').trim().replace(/\*+/g,''),hand=m[4]||'R';
      if(num>=1&&num<=9&&name.length>2&&name.length<40&&!out[cur].find(p=>p.battingOrder===num))
        out[cur].push({name,battingOrder:num,position:'?',batSide:hand,source:'live'});
    }
  }
  const res={};
  for(const[t,p]of Object.entries(out))if(p.length>=8)res[t]=p.sort((a,b)=>a.battingOrder-b.battingOrder);
  console.log('Lineups parsed:',Object.keys(res).length,'teams');
  return res;
}

function parseStatcastCSV(csv,type){
  if(!csv||csv.length<100)return;
  const lines=csv.trim().split('\n');
  const hdr=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
  const get=(row,...keys)=>{for(const k of keys){const i=hdr.indexOf(k);if(i>=0&&row[i])return parseFloat(row[i])||null;}return null;};

  // Name parsing — Baseball Savant CSV has TWO separate columns: "last_name" and "first_name"
  // NOT a single "last_name, first_name" column as it appears in the header display
  const iLast  = hdr.indexOf('last_name');
  const iFirst = hdr.indexOf('first_name');
  const iName  = hdr.indexOf('player_name');  // fallback
  const iId    = hdr.indexOf('player_id');

  const getName = row => {
    if(iFirst>=0 && iLast>=0 && row[iFirst] && row[iLast]) {
      return `${row[iFirst].trim()} ${row[iLast].trim()}`;
    }
    if(iName>=0 && row[iName]) return row[iName].trim();
    return null; // Never use player_id as name
  };
  for(const line of lines.slice(1)){
    const row=line.split(',').map(v=>v.trim().replace(/"/g,''));
    const n=getName(row);if(!n)continue;
    if(type==='exp'){
      const xba=get(row,'xba','est_ba')||0.240,xslg=get(row,'xslg','est_slg')||0.390,xw=get(row,'xwoba','est_woba')||0.310;
      if(!BATTER[n])BATTER[n]={};
      Object.assign(BATTER[n],{xw,iso:+(xslg-xba).toFixed(3)});
    }else if(type==='ev'){
      const ev=get(row,'exit_velocity_avg'),ba=get(row,'barrel_batted_rate','brl_percent'),hh=get(row,'hard_hit_percent');
      const pa=parseInt(row[hdr.indexOf('pa')]||'0');
      if(!BATTER[n])BATTER[n]={};
      if(ev)BATTER[n].ev=ev;if(ba)BATTER[n].ba=ba;if(hh)BATTER[n].hh=hh;
      BATTER[n].pa=pa;
    }else{
      const xera=get(row,'xera'),whiff=get(row,'whiff_percent'),hr9=get(row,'p_hr_per9','hr_per9');
      if(!PITCHER[n])PITCHER[n]={};
      if(xera)PITCHER[n].xera=xera;if(whiff)PITCHER[n].whiff=whiff;if(hr9)PITCHER[n].hr9=hr9;
    }
  }
}

function getBatter(name){
  if(BATTER[name])return BATTER[name];
  // Fuzzy match — handles accent variations, Jr./Sr. etc
  const n=name.toLowerCase().replace(/[^a-z ]/g,'');
  for(const[k,v]of Object.entries(BATTER)){
    if(k.toLowerCase().replace(/[^a-z ]/g,'')===n)return v;
  }
  // Partial match on last name
  const lastName=n.split(' ').pop();
  if(lastName.length>4){
    for(const[k,v]of Object.entries(BATTER)){
      if(k.toLowerCase().replace(/[^a-z ]/g,'').includes(lastName))return v;
    }
  }
  return null;
}
function getPitcher(name){
  if(PITCHER[name])return PITCHER[name];
  const n=name.toLowerCase().replace(/[^a-z ]/g,'');
  for(const[k,v]of Object.entries(PITCHER))if(k.toLowerCase().replace(/[^a-z ]/g,'')===n)return v;
  return null;
}

// Convert American odds to implied probability
function oddsToImplied(american) {
  if (!american) return null;
  if (american > 0) return 100 / (american + 100);
  return Math.abs(american) / (Math.abs(american) + 100);
}

// Convert our HR% to American odds equivalent
function probToAmerican(pct) {
  const p = pct / 100;
  if (p >= 0.5) return Math.round(-(p / (1-p)) * 100);
  return Math.round(((1-p) / p) * 100);
}

// Calculate +EV: returns edge as percentage points
// Positive = we have edge over book, Negative = book has edge
function calcEV(ourPct, bookOdds) {
  if (!bookOdds) return null;
  const bookImplied = oddsToImplied(bookOdds) * 100;
  return +(ourPct - bookImplied).toFixed(1);
}

// ── BUILD ROWS ──
function rebuild(){
  allRows=[];
  for(const g of games){
    const park=getPark(g.home)||{f:1.0};
    const wx=WX[g.home]||{};
    const awayPit={...g.hp,...(getPitcher(g.hp.name)||{})};
    const homePit={...g.ap,...(getPitcher(g.ap.name)||{})};

    [[g.awayLineup,g.away,awayPit],[g.homeLineup,g.home,homePit]].forEach(([lineup,team,pit])=>{
      const confirmed=lineup.length>0;
      const nb=Object.keys(BATTER).length;
      // Generate projected rows even before Statcast loads
      // Uses ERA-based model: pitcher ERA determines defensive difficulty
      // Statcast data enriches these when it arrives
      const batters=confirmed?lineup:generateProjected(team);

      batters.forEach((p,i)=>{
        const bs=getBatter(p.name)||{ev:88.5,ba:8,hh:37,xw:0.310,iso:0.150,pa:0};
        const hrp=hrProb(bs,park,wx,pit,p.battingOrder||(i+1));
        const bookOdds = HR_ODDS[p.name] || null;
        const ev = calcEV(hrp, bookOdds);
        const gameOdds = GAME_ODDS[g.pk] || null;
        allRows.push({
          name:p.name,team,bats:p.batSide||bs.bats||'R',
          order:p.battingOrder||(i+1),
          source:p.source||(confirmed?'confirmed':'projected'),
          ev:bs.ev||88.5,barrel:bs.ba||8,hh:bs.hh||37,
          xwoba:bs.xw||0.310,iso:bs.iso||0.150,hrp,
          park,wx,pit,
          pitName:g.home===team?g.ap.name:g.hp.name,
          time:g.time,game:g,gamePk:g.pk,
          bookOdds, evEdge:ev, gameOdds,
          ou: gameOdds?.ou||null,
        });
      });
    });
  }
  allRows.sort((a,b)=>sortAsc?a[sortKey]-b[sortKey]:b[sortKey]-a[sortKey]);
  // team selector
  const sel=document.getElementById('tsel');
  const prev=sel.value;
  sel.innerHTML='<option value="">All Teams</option>';
  [...new Set(games.flatMap(g=>[g.away,g.home]))].sort().forEach(t=>{
    const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);
  });
  if(prev)sel.value=prev;
  console.log(`rebuild: ${allRows.length} rows, batters:${Object.keys(BATTER).length}`);
}

  document.querySelectorAll('[id^="xe"]').forEach(e=>e.remove());
  const rows=filtered(); const r=rows[i];
  const xe=document.createElement('tr'); xe.id='xe'+i; xe.className='xrow';
  const w=r.wx||{};
  const pk=getPark(r.team)||{};
  const pit=r.pit||{};
  const wxd=pk.roof==='dome'?'Dome (climate controlled)':w.ws?`${Math.round(w.ws)}mph · ${Math.round(w.t||70)}°F`:'—';
  const platoon=(r.bats!=='S')?((r.bats===(pit.hand||'R'))?'⚠ Same side':'✓ Platoon adv'):'— Switch';
  const parkEdge=(pk.f||1)>=1.05?`📈 +${(((pk.f||1)-1)*100).toFixed(0)}% hitter park`:(pk.f||1)<=0.95?`📉 ${(((pk.f||1)-1)*100).toFixed(0)}% pitcher park`:'— Neutral';
  const windEdge=wxd.includes('out')?'💨 Wind blowing out':wxd.includes('in')?'🌬 Wind blowing in':wxd.includes('Dome')?'🏟 Dome':'— Neutral wind';
  const evColor=r.evEdge>2?'var(--green)':r.evEdge<-2?'var(--red)':'var(--t1)';
  const evLabel=r.evEdge>2?`+EV +${r.evEdge}% edge`:r.evEdge<-2?`-EV ${r.evEdge}% edge`:`Fair value (${r.evEdge}%)`;

  xe.innerHTML=`<td colspan="10"><div class="xi">
    <div class="sb2"><div class="sl">HR Probability</div><div class="sv" style="color:var(--teal)">${r.hrp.toFixed(1)}%</div><div class="ss">vs ${r.pitName||'—'}</div></div>
    <div class="sb2"><div class="sl">Exit Velocity</div><div class="sv">${r.ev.toFixed(1)}</div><div class="ss">HH% ${(r.hh||0).toFixed(1)}</div></div>
    <div class="sb2"><div class="sl">Barrel %</div><div class="sv">${r.barrel.toFixed(1)}%</div><div class="ss">Statcast 2026</div></div>
    <div class="sb2"><div class="sl">xwOBA / ISO</div><div class="sv">${r.xwoba.toFixed(3)}</div><div class="ss">ISO ${r.iso.toFixed(3)}</div></div>
    <div class="sb2"><div class="sl">Pitcher xERA</div><div class="sv">${(pit.xera||pit.era||4.5).toFixed(2)}</div><div class="ss">HR/9 ${(pit.hr9||1.2).toFixed(2)} · Whiff ${(pit.whiff||22).toFixed(1)}%</div></div>
    <div class="sb2"><div class="sl">Platoon</div><div class="sv" style="font-size:13px">${platoon}</div><div class="ss">${r.bats||'R'} vs ${pit.hand||'R'}</div></div>
    <div class="sb2"><div class="sl">Park Edge</div><div class="sv" style="font-size:13px">${parkEdge}</div><div class="ss">${pk.name||'—'} · ${pk.elev||0}ft elev</div></div>
    <div class="sb2"><div class="sl">Weather</div><div class="sv" style="font-size:13px">${windEdge}</div><div class="ss">${wxd}</div></div>
    <div class="sb2"><div class="sl">Batting Order</div><div class="sv">${r.order}</div><div class="ss">Slot ${r.order} of 9</div></div>
    ${r.bookOdds?`<div class="sb2"><div class="sl">Book vs Model</div><div class="sv" style="font-size:14px;color:${evColor}">${r.bookOdds>0?'+':''}${r.bookOdds} → ${evLabel}</div><div class="ss">Book implies ${(oddsToImplied(r.bookOdds)*100).toFixed(1)}% · Ours: ${r.hrp.toFixed(1)}%</div></div>`:''}
    ${r.gameOdds?`<div class="sb2"><div class="sl">Game O/U Total</div><div class="sv" style="color:var(--amber)">${r.gameOdds.ou}</div><div class="ss">O ${r.gameOdds.overOdds>0?'+':''}${r.gameOdds.overOdds} / U ${r.gameOdds.underOdds>0?'+':''}${r.gameOdds.underOdds}</div></div>`:''}
  </div>
  <div id="h2h-${i}" style="padding:10px 14px;border-top:1px solid var(--bd);background:var(--bg2)">
    <div style="font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Head-to-Head vs ${r.pitName||'—'} (Career)</div>
    <div id="h2h-data-${i}" style="font-size:12px;color:var(--t3);font-family:var(--mono)">Loading…</div>
  </div></td>`;

  document.getElementById('pr'+i)?.insertAdjacentElement('afterend',xe);

  // Fetch H2H
  const pitId=PITCHER_IDS[r.pitName];
  fetchH2H(r.name,r.pitName,pitId).then(h2h=>{
    const el=document.getElementById(`h2h-data-${i}`);
    if(!el)return;
    if(!h2h||h2h.ab===0){el.innerHTML='<span style="color:var(--t3)">No career matchup data</span>';return;}
    const ac=h2h.avg>=0.300?'var(--green)':h2h.avg>=0.200?'var(--t1)':'var(--red)';
    const hc=h2h.hr>0?'var(--teal)':'var(--t3)';
    el.innerHTML=`<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
      <div><span style="color:var(--t3)">AVG </span><span style="color:${ac};font-weight:700">${h2h.avg.toFixed(3)}</span></div>
      <div><span style="color:var(--t3)">H </span><span style="color:var(--t1)">${h2h.h}/${h2h.ab}</span></div>
      <div><span style="color:var(--t3)">HR </span><span style="color:${hc};font-weight:700">${h2h.hr}</span></div>
      <div><span style="color:var(--t3)">BB </span><span style="color:var(--t1)">${h2h.bb}</span></div>
      <div><span style="color:var(--t3)">K </span><span style="color:var(--t1)">${h2h.k}</span></div>
      <div><span style="color:var(--t3)">OBP </span><span style="color:var(--t1)">${h2h.obp.toFixed(3)}</span></div>
      <div style="color:var(--t3);font-size:10px">${h2h.ab} AB · ${h2h.seasons} season${h2h.seasons!==1?'s':''}</div>
    </div>`;
  }).catch(()=>{
    const el=document.getElementById(`h2h-data-${i}`);
    if(el)el.textContent='H2H lookup unavailable';
  });
}

function filtered(){
  const q=document.getElementById('srch').value.toLowerCase();
  const t=document.getElementById('tsel').value;
  return allRows.filter(r=>{
    if(handFilt&&r.bats!==handFilt)return false;
    if(t&&r.team!==t)return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!r.team.toLowerCase().includes(q))return false;
    return true;
  });
}

function wxStr(team){
  const p=getPark(team);if(!p)return '—';
  if(p.roof==='dome')return '🏟 Dome';
  const w=WX[team];if(!w)return '—';
  const d=((w.wd-(p.orient||180))%360+360)%360;
  const dir=d<45||d>315?'↑ out':d>135&&d<225?'↓ in':'→ cross';
  return `${Math.round(w.ws)}mph ${dir} · ${Math.round(w.t||70)}°F`;
}

function renderPlayers(){
  const rows=filtered();
  const body=document.getElementById('ptbody');
  updateSbar(rows);
  if(!rows.length){
    const nb=Object.keys(BATTER).length;
    const nl=games.filter(g=>g.awayLineup.length||g.homeLineup.length).length;
    body.innerHTML=`<tr><td colspan="10"><div class="empty">
      <div style="font-size:28px;margin-bottom:10px">⚾</div>
      <h3>${nl>0?'Statcast loading…':'Waiting for confirmed lineups'}</h3>
      <div style="font-family:monospace;font-size:11px;margin-top:10px;text-align:left;display:inline-block;background:var(--bg3);padding:10px 14px;border-radius:6px;border:1px solid var(--bd)">
        <div style="color:${nl>0?'var(--green)':'var(--amber)'}">
          ${nl>0?'✓':'⏳'} Lineups: ${nl>0?nl+' teams confirmed':'managers post 2-3 hrs before first pitch'}
        </div>
        <div style="color:${nb>0?'var(--green)':'var(--amber)'}">
          ${nb>0?'✓':'⏳'} Statcast: ${nb>0?nb+' batters loaded':'loading…'}
        </div>
      </div>
      <p style="margin-top:10px;font-size:11px;color:var(--t3)">Switch to ⬡ Games tab to see today's ${games.length} matchups now</p>
    </div></td></tr>`;
    return;
  }
  body.innerHTML=rows.map((r,i)=>{
    const hc=r.hrp>=12?'hi':r.hrp>=7?'md':'lo';
    const ec=r.ev>=93?'hi':r.ev>=89?'md':'lo';
    const bc=r.barrel>=15?'hi':r.barrel>=9?'md':'lo';
    const sb=r.source==='live'||r.source==='confirmed'
      ?`<span class="sb slive">✓</span>`:`<span class="sb sproj">~</span>`;
    const pct=Math.min(100,r.hrp/25*100);
    // +EV badge
    const evBadge = r.bookOdds ? (
      r.evEdge > 2
        ? `<span style="font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)">+EV +${r.evEdge}%</span>`
        : r.evEdge < -2
        ? `<span style="font-size:9px;font-family:var(--mono);padding:2px 5px;border-radius:3px;background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)">-EV</span>`
        : `<span style="font-size:9px;font-family:var(--mono);padding:2px 5px;border-radius:3px;background:var(--bg3);color:var(--t3);border:1px solid var(--bd)">FAIR</span>`
    ) : `<span style="font-size:9px;color:var(--t3)">—</span>`;
    const oddsStr = r.bookOdds
      ? `${r.bookOdds>0?'+':''}${r.bookOdds}`
      : '—';
    return `<tr onclick="expand(${i})" id="pr${i}">
      <td class="rk">${i+1}</td>
      <td><div class="pn">${r.name}${sb}</div><div class="pt">${r.team} · ${r.time}</div></td>
      <td class="mono" style="color:var(--t2)">${r.team}</td>
      <td style="font-size:12px;color:var(--t2)">${r.pitName||'—'}</td>
      <td style="font-size:11px;color:var(--t3)">${r.park?.name||'—'}</td>
      <td style="font-size:11px;color:var(--t3)">${wxStr(r.team)}</td>
      <td><div class="pbar"><span class="mono ${hc}">${r.hrp.toFixed(1)}%</span><div class="btr"><div class="bfill" style="width:${pct}%"></div></div></div></td>
      <td><div class="mono" style="font-size:11px;color:var(--t2)">${oddsStr}</div>${evBadge}</td>
      <td class="mono ${bc}">${r.barrel.toFixed(1)}%</td>
      <td class="mono ${ec}">${r.ev.toFixed(1)}</td>
    </tr>`;
  });;
}

function renderGames(){
  const grid=document.getElementById('ggrid');
  if(!allRows.length){grid.innerHTML='<div class="empty"><h3>Loading…</h3></div>';return;}

  grid.innerHTML=games.map(g=>{
    const park=getPark(g.home)||{};
    const wx=WX[g.home]||{};
    const ap=getPitcher(g.ap.name)||{};
    const hp=getPitcher(g.hp.name)||{};

    // Get top HR threats from this specific game
    const gameRows=allRows.filter(r=>r.gamePk===g.pk);
    const awayRows=gameRows.filter(r=>r.team===g.away).sort((a,b)=>b.hrp-a.hrp).slice(0,5);
    const homeRows=gameRows.filter(r=>r.team===g.home).sort((a,b)=>b.hrp-a.hrp).slice(0,5);

    const hasLU=g.awayLineup.length||g.homeLineup.length;
    const pill=hasLU?'<span class="gpill plive">✓ Lineup</span>':'<span class="gpill ppend">⏳ Projected</span>';
    const wstr=park.roof==='dome'?'🏟 Dome':wx.ws?`🌬 ${Math.round(wx.ws)}mph · ${Math.round(wx.t||70)}°F`:'—';

    const threatRow=(r,i)=>{
      const hc=r.hrp>=12?'hi':r.hrp>=7?'md':'lo';
      const src=r.source==='live'||r.source==='confirmed'
        ?'<span style="font-size:9px;color:var(--green)">✓</span>'
        :'<span style="font-size:9px;color:var(--amber)">~</span>';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd)">
        <div style="font-size:12px;color:var(--t1);font-weight:500">${i+1}. ${r.name} ${src}</div>
        <div style="font-family:var(--mono);font-size:12px;font-weight:700" class="${hc}">${r.hrp.toFixed(1)}%</div>
      </div>`;
    };

    const teamSection=(rows,team,pitName,pitStats)=>`
      <div style="padding:10px 14px;flex:1;min-width:0">
        <div style="font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">
          ${team} vs <span style="color:var(--t2)">${pitName}</span>
          <span style="color:var(--t3);margin-left:6px">xERA ${(pitStats.xera||4.5).toFixed(2)}</span>
        </div>
        ${rows.length?rows.map((r,i)=>threatRow(r,i)).join(''):'<div style="font-size:11px;color:var(--t3);padding:8px 0">Loading…</div>'}
      </div>`;

    return `<div class="gc">
      <div class="gch">
        <div class="gct">${g.away} <span style="color:var(--t3)">@</span> ${g.home}</div>
        <div style="display:flex;align-items:center;gap:8px">${pill}<div class="gctime">${g.time}</div></div>
      </div>
      <div class="gpits">
        <div class="gpc"><div class="gpct">${g.away}</div><div class="gpcn">${g.ap.name}</div><div class="gpcs">xERA ${(ap.xera||g.ap.era).toFixed(2)} · Whiff ${ap.whiff?ap.whiff.toFixed(1)+'%':'—'}</div></div>
        <div class="gpc"><div class="gpct">${g.home}</div><div class="gpcn">${g.hp.name}</div><div class="gpcs">xERA ${(hp.xera||g.hp.era).toFixed(2)} · Whiff ${hp.whiff?hp.whiff.toFixed(1)+'%':'—'}</div></div>
      </div>
      <div class="gwx">
        <span>${park.name||g.home}</span>
        <span style="color:var(--bd)">·</span>
        <span>PF ${(park.f||1).toFixed(2)}</span>
        <span style="color:var(--bd)">·</span>
        <span>${wstr}</span>
        ${GAME_ODDS[g.pk]?`<span style="color:var(--bd)">·</span><span style="color:var(--amber);font-weight:600">O/U ${GAME_ODDS[g.pk].ou}</span>`:''}
      </div>
      <div style="display:flex;border-top:1px solid var(--bd)">
        ${teamSection(awayRows,g.away,g.hp.name,hp)}
        <div style="width:1px;background:var(--bd)"></div>
        ${teamSection(homeRows,g.home,g.ap.name,ap)}
      </div>
    </div>`;
  }).join('');
}


function renderTargets(){
  // Deduplicate by player name — keep only each player's highest HR% matchup
  // This prevents the same player appearing multiple times from projected lineups
  const seen = new Map();
  for(const r of allRows){
    const existing = seen.get(r.name);
    if(!existing || r.hrp > existing.hrp) seen.set(r.name, r);
  }
  const top = [...seen.values()].sort((a,b)=>b.hrp-a.hrp).slice(0,24);
  document.getElementById('tgrid').innerHTML=top.length?top.map((r,i)=>{
    const tags=[];
    if(r.barrel>=15) tags.push({c:'hot',  t:'🔥 Elite Barrel'});
    if(r.ev>=93)     tags.push({c:'hot',  t:`⚡ EV ${r.ev.toFixed(1)}`});
    if((r.park?.f||1)>=1.05) tags.push({c:'park', t:'📈 Hitter Park'});
    if((r.pit?.xera||r.pit?.era||4.5)>=5.0) tags.push({c:'pit', t:'🎯 Weak Pitcher'});
    const src = r.source==='live'||r.source==='confirmed'
      ? '<span class="sb slive" style="font-size:9px">✓ Live</span>'
      : '<span class="sb sproj" style="font-size:9px">~ Proj</span>';
    // EV edge badge
    const evBadge = r.bookOdds
      ? (r.evEdge > 2
          ? `<span style="font-size:10px;font-family:var(--mono);font-weight:700;padding:2px 8px;border-radius:3px;background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)">+EV +${r.evEdge}%</span>`
          : r.evEdge < -2
          ? `<span style="font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:3px;background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)">-EV ${r.evEdge}%</span>`
          : `<span style="font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--t3);border:1px solid var(--bd)">FAIR</span>`)
      : '';
    return `<div class="tcard ${i<3?'t3':''}">
      <div class="trk">${i+1}</div>
      <div class="tn">${r.name} ${src}</div>
      <div class="tteam">${r.team} vs ${r.pitName} · ${r.time}</div>
      <div style="display:flex;align-items:baseline;gap:10px;margin:4px 0">
        <div class="tprob">${r.hrp.toFixed(1)}<span>%</span></div>
        ${evBadge}
      </div>
      ${r.bookOdds?`<div style="font-family:var(--mono);font-size:11px;color:var(--t3)">${r.bookOdds>0?'+':''}${r.bookOdds} · implies ${(oddsToImplied(r.bookOdds)*100).toFixed(1)}%</div>`:''}
      ${r.ou?`<div style="font-family:var(--mono);font-size:10px;color:var(--amber)">O/U ${r.ou}</div>`:''}
      <div class="ttags" style="margin-top:4px">${tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>
    </div>`;
  }).join(''):'<div class="empty"><h3>Loading…</h3></div>';
}

function updateSbar(rows){
  const live=rows.filter(r=>r.source==='live'||r.source==='confirmed').length;
  const proj=rows.filter(r=>r.source==='projected').length;
  const sb=document.getElementById('sbar');
  sb.innerHTML=`<span>${rows.length} batters</span>`+
    (live?`<span style="color:var(--green)">✅ ${live} confirmed</span>`:'')+'  '+
    (proj?`<span style="color:var(--amber)">⏳ ${proj} projected</span>`:'')+'  '+
    `<span style="color:${statReady?'var(--teal)':'var(--t3)'}">${statReady?'● Statcast live':'○ Statcast loading…'}</span>`;
}

function renderAll(){
  if(curView==='players')renderPlayers();
  else if(curView==='games')renderGames();
  else renderTargets();
}

// ── UI ──
function setView(v,el){
  curView=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el?.classList.add('active');
  ['players','games','targets'].forEach(id=>document.getElementById('v'+id).classList.toggle('on',id===v));
  document.getElementById('fbar').style.display=v==='players'?'flex':'none';
  renderAll();
}
function hand(h,el){handFilt=h;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el?.classList.add('on');renderPlayers();}
function sortBy(k){if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=false;}allRows.sort((a,b)=>sortAsc?a[k]-b[k]:b[k]-a[k]);renderPlayers();}
function setStatus(s,msg){document.getElementById('sdot').className='dot '+(s==='live'?'live':s==='loading'?'spin':'');document.getElementById('stxt').textContent=msg;}
async function doRefresh(){
  setStatus('loading','Refreshing…');
  await Promise.allSettled([loadLineups(),loadWeather()]);
  rebuild();renderAll();
  const conf=games.filter(g=>g.awayLineup.length||g.homeLineup.length).length;
  setStatus(conf>0?'live':'loading',`${games.length} games · ${conf} lineups · ${statReady?'Statcast live':'Statcast loading'}`);
}

// ── AUTO-UPDATE via sendPrompt (works when opened in Claude chat) ──
function requestSlateUpdate() {
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const msg = `Update the HRProb odds for ${today}: fetch today's HR prop odds from FanDuel and today's game O/U totals for all games. Update only GAME_ODDS and HR_ODDS in index.html and provide the updated file.`;

  if (typeof window.sendPrompt === 'function') {
    // Running inside Claude chat — trigger directly
    window.sendPrompt(msg);
    document.getElementById('update-btn').textContent = '⏳ Updating…';
    document.getElementById('update-btn').disabled = true;
  } else {
    // Standalone — copy prompt to clipboard
    navigator.clipboard?.writeText(msg).then(() => {
      const btn = document.getElementById('update-btn');
      const orig = btn.textContent;
      btn.textContent = '✓ Prompt copied — paste into Claude chat';
      setTimeout(() => { btn.textContent = orig; }, 4000);
    }).catch(() => {
      alert('Open this file in Claude.ai and click Update Slate to auto-refresh, or paste this into Claude chat:\n\n' + msg);
    });
  }
}

// Check if today's slate is stale and auto-prompt if in Claude chat
function checkSlateDate() {
  // Only show stale banner if odds haven't been updated
  // Schedule/pitchers/lineups come from API so they're always fresh
  const etStr = new Date().toLocaleString('en-US',{timeZone:'America/New_York'});
  const today = new Date(etStr).toLocaleDateString('en-CA');
  const banner = document.getElementById('stale-banner');
  if (SLATE.date !== today) {
    // Odds may be stale — show banner so user can update just the odds
    banner.style.display = 'flex';
    document.getElementById('stale-date').textContent = SLATE.date;
    document.getElementById('today-date').textContent = today;
  } else {
    banner.style.display = 'none';
  }
}

async function init(){
  document.getElementById('hdr-date').textContent=
    new Date(SLATE.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
  setStatus('loading','Loading…');
  checkSlateDate();

  // ── Try /api/slate first (Vercel) ──────────────────────────
  // This is the fast path — server-side fetches real schedule,
  // confirmed lineups from RotoWire, and weather in one call (~3 sec)
  let apiSlateLoaded = false;
  try {
    const r = await safeFetch('/api/slate', 12000);
    if (r.ok) {
      const slate = await r.json();
      if (slate.pitchers?.length) {
        // Sync date
        if (slate.date) {
          SLATE.date = slate.date;
          document.getElementById('hdr-date').textContent =
            new Date(slate.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
          checkSlateDate();
        }
        // Build games from live pitcher data
        games = slate.pitchers.map(g => ({
          pk: g.gamePk,
          time: new Date(g.gameTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET',
          away: g.awayTeam, home: g.homeTeam,
          // Merge API ERA with any Statcast we already have loaded
          ap: {name:g.awayPitcher||'TBD', hand:g.awayPitcherHand||'R',
               era:g.awayPitcherEra||4.50, ...(PITCHER[g.awayPitcher]||{})},
          hp: {name:g.homePitcher||'TBD', hand:g.homePitcherHand||'R',
               era:g.homePitcherEra||4.50, ...(PITCHER[g.homePitcher]||{})},
          awayLineup: [], homeLineup: [],
        })).filter(g => getPark(g.home)||getPark(g.away));
        console.log('Games built:', games.length, '| Sample GAME_ODDS key:', games[0]?.pk, '| Match:', !!GAME_ODDS[games[0]?.pk]);

        // Merge lineups
        if (slate.lineups) {
          for (const [team, players] of Object.entries(slate.lineups)) {
            const g = games.find(g => g.away===team||g.home===team);
            if (!g) continue;
            const lineup = players.map((p,i) => ({
              name: p.name||p.fullName, battingOrder: p.battingOrder||(i+1),
              position: p.position||'?', batSide: p.batSide||'R', source:'live'
            }));
            if (g.away===team) g.awayLineup = lineup;
            else g.homeLineup = lineup;
          }
        }

        // Merge weather — API format: {t, w, d, dome, l, s}
        // Frontend format: {t, ws, wd, dome, label}
        if (slate.weather) {
          for (const [team, wx] of Object.entries(slate.weather)) {
            WX[team] = {
              t:    wx.t  || 72,
              ws:   wx.w  || 0,
              wd:   wx.d  || 180,
              dome: wx.dome || false,
              label: wx.l || '',
              sky:  wx.s  || '',
            };
          }
        }

        apiSlateLoaded = true;
        console.log(`/api/slate OK: ${games.length} games, ${Object.keys(slate.lineups||{}).length} lineups, ${Object.keys(slate.weather||{}).length} wx parks`);
      } else {
        console.warn('/api/slate returned no pitchers — using baked SLATE');
      }
    } else {
      console.warn('/api/slate HTTP', r.status, '— using baked SLATE');
    }
  } catch(e) {
    console.warn('/api/slate error:', e.message, '— using baked SLATE');
  }

  // Always ensure games is populated (baked SLATE as fallback)
  if (!games.length) {
    games = SLATE.games.map(g => ({...g, awayLineup:[], homeLineup:[]}));
    console.log('Using baked SLATE:', games.length, 'games');
  }

  // ── Show UI immediately ─────────────────────────────────────
  rebuild();
  setView('games', document.querySelector('.tab[onclick*="games"]'));
  const conf0 = games.filter(g=>g.awayLineup.length||g.homeLineup.length).length;
  setStatus('loading',`${games.length} games · ${conf0>0?conf0+' lineups · ':''}Statcast loading…`);
  renderAll();

  // ── Browser fallbacks (only if API slate didn't load) ──────
  if (!apiSlateLoaded) {
    loadWeather().then(()=>{rebuild();renderAll();}).catch(()=>{});
    loadLineups().then(n=>{
      if(n>0){rebuild();renderAll();}
      const conf=games.filter(g=>g.awayLineup.length||g.homeLineup.length).length;
      setStatus('loading',`${games.length} games · ${conf>0?conf+' lineups · ':''}Statcast loading…`);
    }).catch(()=>{});
  }

  // ── Statcast — always load in background ───────────────────
  // /api/statcast first (Vercel), browser proxy as fallback
  const statTimer=setTimeout(()=>{
    if(!statReady){
      statReady=true;
      console.warn('Statcast timed out');
      setStatus('live',`${games.length} games · ${statReady?'Statcast live':'ERA model only'}`);
      rebuild();renderAll();
    }
  },35000);

  // Try /api/statcast (Vercel server-side — no CORS, fast)
  const statcastSource = async () => {
    try {
      const r = await safeFetch('/api/statcast', 30000);
      if (r.ok) {
        const d = await r.json();
        if (d.batters) {
          for (const [name,s] of Object.entries(d.batters)) {
            if ((s.ev||0)>0) BATTER[name]={ev:+s.ev.toFixed(1),ba:+(s.ba||0).toFixed(1),hh:+(s.hh||0).toFixed(1),xw:+(s.xw||0.310).toFixed(3),iso:+(s.iso||0.150).toFixed(3),pa:s.pa||0,bats:BATTER[name]?.bats||'R'};
          }
          console.log('/api/statcast batters:', Object.keys(d.batters).length);
        }
        if (d.pitchers) {
          for (const [name,s] of Object.entries(d.pitchers)) {
            PITCHER[name] = {
              xera:  +(s.xera||4.50).toFixed(2),
              whiff: +(s.whiff||22).toFixed(1),
              hr9:   +(s.hr9||1.2).toFixed(2),
              hh:    +(s.hh_pct||s.hh||38).toFixed(1),
              hand:  PITCHER[name]?.hand || 'R',
            };
          }
          console.log('/api/statcast pitchers:', Object.keys(d.pitchers).length);
          // Re-enrich game pitcher objects with real Statcast
          for (const g of games) {
            if (g.ap?.name && PITCHER[g.ap.name]) Object.assign(g.ap, PITCHER[g.ap.name]);
            if (g.hp?.name && PITCHER[g.hp.name]) Object.assign(g.hp, PITCHER[g.hp.name]);
          }
          return true;
        }
        if (d.batters) return true;
      }
    } catch(e) { console.log('No /api/statcast, trying browser proxy'); }
    // Fall back to browser proxy
    await loadStatcast();
    return false;
  };

  statcastSource()
    .then(()=>{ clearTimeout(statTimer); statReady=true; rebuild(); renderAll();
      const conf=games.filter(g=>g.awayLineup.length||g.homeLineup.length).length;
      setStatus('live',`${games.length} games · ${conf>0?conf+' lineups · ':''}Statcast live`);
    })
    .catch(e=>{ clearTimeout(statTimer); console.error('Statcast error:',e); if(!statReady){statReady=true;rebuild();renderAll();} });

  // ── Auto-refresh every 5 min ────────────────────────────────
  setInterval(async ()=>{
    try {
      const r = await safeFetch('/api/slate',10000);
      if (r.ok) {
        const slate = await r.json();
        if (slate.lineups) {
          for (const [team,players] of Object.entries(slate.lineups)) {
            const g = games.find(g=>g.away===team||g.home===team);
            if (!g) continue;
            const lu = players.map((p,i)=>({name:p.name||p.fullName,battingOrder:p.battingOrder||(i+1),position:p.position||'?',batSide:p.batSide||'R',source:'live'}));
            if (g.away===team) g.awayLineup=lu; else g.homeLineup=lu;
          }
          rebuild(); renderAll();
        }
      } else { loadLineups().then(n=>{if(n>0){rebuild();renderAll();}}); }
    } catch(e) { loadLineups().then(n=>{if(n>0){rebuild();renderAll();}}); }
  }, 5*60*1000);
}

init();
</script>
</body>
</html>
