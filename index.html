// ═══════════════════════════════════════════════════════════════
//  VIEW / FILTER / SORT
// ═══════════════════════════════════════════════════════════════
function setView(v,btn) {
  currentView = v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('player-thead').style.display  = v==='player'  ? '' : 'none';
  document.getElementById('player-view').style.display   = v==='player'  ? '' : 'none';
  document.getElementById('game-view').style.display     = v==='game'    ? '' : 'none';
  document.getElementById('targets-view').style.display  = v==='targets' ? '' : 'none';
  document.getElementById('state-view').style.display    = 'none';
  if (v==='game')    renderGameView();
  else if (v==='targets') renderTargets();
  else filt();
}
function setH(btn,h) {
  handF=h;
  document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  filt();
}
function filt() {
  // If no confirmed lineups yet, show pending state instead of blank
  if (!allRows.length) {
    if (liveGames.length > 0) {
      if (currentView === 'game') { renderGameView(); return; }
      if (currentView === 'targets') { renderTargets(); return; }
      const tbody = document.querySelector('#player-view tbody');
      const confirmed = liveGames.filter(g=>g.awayLineup?.length||g.homeLineup?.length).length;
      if (tbody) tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:48px 20px;font-family:var(--fm)">
        <div style="font-size:32px;margin-bottom:14px">⏳</div>
        <div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:8px">${liveGames.length} games scheduled today</div>
        <div style="color:var(--t2);font-size:12px;margin-bottom:6px">${confirmed > 0 ? confirmed + ' lineups confirmed · ' : ''}Lineups typically post 3–4 hrs before first pitch</div>
        <div style="color:var(--t3);font-size:11px">Switch to <b>Game</b> view to see today's matchups and pitchers</div>
      </td></tr>`;
    }
    return;
  }
  const q    = document.getElementById('search').value.toLowerCase();
  const team = document.getElementById('tSel').value;
  const sort = document.getElementById('sSel').value;
  let rows = [...allRows];
  if (q)    rows = rows.filter(r=>r.name.toLowerCase().includes(q)||r.team.toLowerCase().includes(q));
  if (team) rows = rows.filter(r=>r.team===team);
  if (handF) rows = rows.filter(r=>r.bats===handF);
  rows.sort((a,b)=>(b[sort]||0)-(a[sort]||0));
  if (currentView==='game') renderGameView();
  else renderTable(rows);
  requestAnimationFrame(updateOffsets);
}


// ═══════════════════════════════════════════════════════════════
//  TOP TARGETS VIEW
// ═══════════════════════════════════════════════════════════════
function scoreTarget(r) {
  // Composite score weighted across 4 pillars
  // Each pillar scored 0-25, total 0-100
  const isoScore     = Math.min(25, (r.iso || 0) * 90);                    // ISO pillar (max ~.280)
  const hotScore     = Math.min(25, Math.max(0, ((r.hbF||0) + 0.05) * 200)); // Hot bat pillar
  const parkWxScore  = Math.min(25, Math.max(0, ((r.parkWx||0) + 3) * 3.5)); // Park+weather pillar
  const matchupScore = Math.min(25, Math.max(0, ((r.matchup||0) + 5) * 2.5)); // Pitcher matchup pillar
  return {
    total: +(isoScore + hotScore + parkWxScore + matchupScore).toFixed(1),
    iso:   +isoScore.toFixed(1),
    hot:   +hotScore.toFixed(1),
    park:  +parkWxScore.toFixed(1),
    matchup: +matchupScore.toFixed(1),
  };
}

function renderTargets() {
  const el = document.getElementById('targets-view');
  if (!el) return;

  if (!allRows.length) {
    const confirmed = liveGames.filter(g=>g.awayLineup?.length||g.homeLineup?.length).length;
    el.innerHTML = `<div style="text-align:center;padding:48px 20px;font-family:var(--fm)">
      <div style="font-size:32px;margin-bottom:14px">⏳</div>
      <div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:8px">${liveGames.length} games today</div>
      <div style="color:var(--t2);font-size:12px">Top Targets will populate once lineups are confirmed</div>
    </div>`;
    return;
  }

  // Score and rank all confirmed batters
  const scored = allRows.map(r => ({...r, score: scoreTarget(r)}))
    .sort((a,b) => b.score.total - a.score.total);

  const top5 = scored.slice(0, 5);
  const rest = scored.slice(5, 20); // show top 20 in secondary list

  const pillarBar = (val, max=25, color='var(--gold)') => {
    const pct = Math.min(100, (val/max)*100).toFixed(0);
    return `<div style="flex:1;height:6px;background:var(--b2);border-radius:3px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width .4s"></div>
    </div>`;
  };

  const gameMeta = r => {
    const g = r.game;
    return `${g.awayTeamName} @ ${g.homeTeamName} · ${r.timeStr}`;
  };

  // Top 5 hero cards
  const heroCards = top5.map((r, i) => {
    const s = r.score;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="font-size:14px;font-weight:800;color:var(--t2)">#${i+1}</span>`;
    const pitcherName = r.pitcher?.name || 'TBD';
    const pitcherHand = r.pitcher?.hand || '?';
    const platoonTag  = r.plF > 0
      ? `<span class="tag tg" style="font-size:10px">Platoon ✓</span>`
      : `<span class="tag tr" style="font-size:10px">Same side</span>`;
    const hotTag = r.hotStreak
      ? `<span class="tag tg" style="font-size:10px">🔥 Hot streak</span>`
      : r.hbF < -0.02
      ? `<span class="tag tr" style="font-size:10px">❄️ Cold</span>` : '';
    const parkTag = r.aF > 1 || r.dF > 1
      ? `<span class="tag tg" style="font-size:10px">Hitter park</span>`
      : r.dF < -1
      ? `<span class="tag tr" style="font-size:10px">Pitcher park</span>` : '';
    const windTag = r.wF > 0.5
      ? `<span class="tag tg" style="font-size:10px">🌬 Blowing out</span>`
      : r.wF < -0.5
      ? `<span class="tag tr" style="font-size:10px">🌬 Blowing in</span>` : '';

    return `
    <div class="target-hero" onclick="setView('player', document.getElementById('vbtn-player')); setTimeout(()=>{ document.getElementById('search').value='${r.name}'; filt(); },50)">
      <div class="th-rank">${medal}</div>
      <div class="th-body">
        <div class="th-header">
          <div>
            <div class="th-name">${r.hotStreak?'🔥':''} ${r.name}</div>
            <div class="th-meta">${r.team} · ${r.bats}HB · ${r.order ? '#'+r.order+' hitter' : ''} · ${gameMeta(r)}</div>
          </div>
          <div class="th-pct">${r.pct}%</div>
        </div>
        <div class="th-score-total">
          <span style="font-family:var(--fm);font-size:11px;color:var(--t3)">Target Score</span>
          <span style="font-family:var(--fm);font-size:18px;font-weight:800;color:var(--gold)">${s.total}</span>
          <span style="font-family:var(--fm);font-size:10px;color:var(--t3)">/100</span>
        </div>
        <div class="th-pillars">
          <div class="th-pillar">
            <div class="th-plabel">ISO <span style="color:var(--t1)">${(r.iso||0).toFixed(3)}</span></div>
            ${pillarBar(s.iso, 25, '#4299e1')}
            <div class="th-pval">${s.iso.toFixed(0)}</div>
          </div>
          <div class="th-pillar">
            <div class="th-plabel">Hot Bat <span style="color:var(--t1)">${r.hrL10!=null?r.hrL10+'/L10':r.hbF>=0?'+':''}${r.hbF!=null?(r.hbF*100).toFixed(1)+'%':''}</span></div>
            ${pillarBar(s.hot, 25, '#f6ad55')}
            <div class="th-pval">${s.hot.toFixed(0)}</div>
          </div>
          <div class="th-pillar">
            <div class="th-plabel">Park+Wx <span style="color:var(--t1)">${r.parkWx>=0?'+':''}${r.parkWx!=null?r.parkWx.toFixed(1)+'%':''}</span></div>
            ${pillarBar(s.park, 25, '#2dd4bf')}
            <div class="th-pval">${s.park.toFixed(0)}</div>
          </div>
          <div class="th-pillar">
            <div class="th-plabel">Matchup <span style="color:var(--t1)">vs ${pitcherHand}HP</span></div>
            ${pillarBar(s.matchup, 25, '#9f7aea')}
            <div class="th-pval">${s.matchup.toFixed(0)}</div>
          </div>
        </div>
        <div class="th-tags">
          ${platoonTag}${hotTag}${parkTag}${windTag}
          ${isoBadge(r.iso)}${hr9Badge(r.pitcher?.hr9)}
        </div>
        <div class="th-pitcher">Facing: <b>${pitcherName}</b> (${pitcherHand}HP · ${r.pitcher?.era||'?'} ERA${r.pitcher?.xera?' · '+r.pitcher.xera+' xERA':''})</div>
      </div>
    </div>`;
  }).join('');

  // Secondary ranked list (6-20)
  const secondaryRows = rest.map((r, i) => {
    const s = r.score;
    const pitName = r.pitcher?.name || 'TBD';
    return `<div class="target-row" onclick="setView('player', document.getElementById('vbtn-player')); setTimeout(()=>{ document.getElementById('search').value='${r.name}'; filt(); },50)">
      <div class="tr-rank rn" style="width:22px;height:22px;font-size:11px;border-radius:3px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-weight:700;color:var(--t2)">${i+6}</div>
      <div class="tr-body">
        <div style="font-size:14px;font-weight:700;color:var(--t1)">${r.hotStreak?'🔥':''} ${r.name} <span style="font-size:11px;font-weight:400;color:var(--t2)">${r.team} · ${r.bats}HB</span></div>
        <div style="font-size:11px;color:var(--t3);font-family:var(--fm)">${r.timeStr} · vs ${pitName} · ${r.pct}% HR prob</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:var(--fm);font-size:15px;font-weight:800;color:var(--gold)">${s.total}</div>
        <div style="font-family:var(--fm);font-size:10px;color:var(--t3)">score</div>
      </div>
      <div style="display:flex;gap:3px;align-items:center;flex-shrink:0;min-width:120px">
        <div style="flex:1;height:4px;background:var(--b2);border-radius:2px;overflow:hidden">
          <div style="width:${Math.min(100,(s.total/100)*100).toFixed(0)}%;height:100%;background:var(--gold);border-radius:2px"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
  <div style="padding:14px 18px 0">
    <div style="font-size:11px;font-family:var(--fm);color:var(--t3);margin-bottom:12px">
      Ranked by composite Target Score (ISO 25pts + Hot Bat 25pts + Park+Weather 25pts + Pitcher Matchup 25pts)
      · ${allRows.length} confirmed batters · Click any card to jump to Player view
    </div>
    <div class="targets-grid">${heroCards}</div>
    ${rest.length ? `
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-family:var(--fm);margin:16px 0 8px">Also Targeting</div>
    <div class="targets-list">${secondaryRows}</div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  CSV EXPORT
// ═══════════════════════════════════════════════════════════════
function expCSV() {
  const h = ["Rank","Player","Confirmed","HotStreak","HR_Szn","HR_L10G","HotBat_F","ISO","Team","Bats","Order","Park","City","Game","Time","TempF","Humidity","WindMph","WindDir","WindLabel","Condition","Pitcher","PitcherHand","ERA","xERA","Whiff%","HR9","HR_Prob%","Barrel%","ExitVelo","xwOBA","Platoon_Adv","Matchup","ParkWx"];
  const rows = [...allRows].sort((a,b)=>b.pct-a.pct).map((r,i) => {
    const bh = r.bats==='S'?(r.pitcher?.hand==='R'?'L':'R'):r.bats;
    return [i+1,r.name,r.verified?'Y':'N',r.hotStreak?'Y':'N',r.hrSzn??'',r.hrL10??'',r.hbF,r.iso??'',r.team,r.bats,r.order,r.park.n,r.park.city,`${r.game.awayTeamName}@${r.game.homeTeamName}`,r.timeStr,r.wx.t,r.wx.h,r.wx.w,r.wx.c,r.wx.l,r.wx.s,r.pitcher?.name||'TBD',r.pitcher?.hand||'?',r.pitcher?.era||'',r.pitcher?.xera||'',r.pitcher?.whiff||'',r.pitcher?.hr9||'',r.pct,r.barrel,r.ev,r.xwoba||'',bh!==r.pitcher?.hand&&r.bats!=='S'?'Y':'N',r.matchup,r.parkWx];
  });
  const csv = [h,...rows].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `mlb_hr_prob_${SLATE_ISO}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════════════════════
//  STICKY OFFSET MEASUREMENT
// ═══════════════════════════════════════════════════════════════
function updateOffsets() {
  const hh    = document.querySelector('.hdr')?.offsetHeight    || 52;
  const ch    = document.querySelector('.ctrl')?.offsetHeight   || 88;
  const shell = document.getElementById('sticky-shell')?.offsetHeight || 0;
  const root  = document.documentElement.style;
  root.setProperty('--hdr-h',      hh + 'px');
  root.setProperty('--ctrl-h',     ch + 'px');
  root.setProperty('--sticky-top', (hh + ch) + 'px');
  // scroll-margin needs to clear hdr + ctrl + sticky shell
  const totalFixed = hh + ch + shell;
  root.setProperty('--scroll-offset', totalFixed + 'px');
}
window.addEventListener('load', updateOffsets);
window.addEventListener('resize', updateOffsets);
// Also fire after fonts load and after a short delay to catch late layout shifts
document.fonts?.ready?.then(updateOffsets);
setTimeout(updateOffsets, 300);

//  BOOT
// ═══════════════════════════════════════════════════════════════
fetchSlate();
setInterval(fetchLiveWeather, 30*60*1000); // Refresh weather every 30 min
</script>
