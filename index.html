<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MLB HR Probability Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0d;--s1:#0f1216;--s2:#161b22;--s3:#1e242d;
  --b1:#1e2530;--b2:#2a3340;--b3:#354050;
  --t1:#f4f6fa;--t2:#a8b4c8;--t3:#64748b;
  --gold:#f0a500;--gold2:#ffc840;--blue:#4299e1;--green:#38a169;
  --red:#e53e3e;--teal:#2dd4bf;--amber:#f6ad55;--purple:#9f7aea;
  --hdr-h:52px;--ctrl-h:88px;--sticky-top:calc(var(--hdr-h) + var(--ctrl-h));
  --fd:'Barlow Condensed',sans-serif;--fm:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:calc(var(--scroll-offset, 200px) + 8px)}
body{background:var(--bg);color:var(--t1);font-family:var(--fd);min-height:100vh;line-height:1.4;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
select,button,input{font-family:var(--fd)}

.hdr{background:linear-gradient(135deg,#0f1216,#161b22);border-bottom:1px solid var(--b2);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:24px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--gold)}
.hdr-logo span{color:var(--t2);font-weight:400}
.hdr-date{font-family:var(--fm);font-size:11px;color:var(--t3);padding:3px 8px;background:var(--s3);border:1px solid var(--b2);border-radius:4px;flex-shrink:0}
.api-status{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid;margin-left:4px;flex-shrink:0;cursor:default}
.api-live{color:var(--teal);background:rgba(45,212,191,.08);border-color:rgba(45,212,191,.25)}
.api-stale{color:var(--amber);background:rgba(246,173,85,.08);border-color:rgba(246,173,85,.25)}
.api-error{color:var(--red);background:rgba(229,62,62,.08);border-color:rgba(229,62,62,.25)}
.api-loading{color:var(--t3);background:rgba(74,85,104,.08);border-color:rgba(74,85,104,.25)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{margin-left:auto;padding:4px 10px;background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:var(--fm);font-size:10px;border-radius:4px;cursor:pointer;transition:all .15s;flex-shrink:0}
.refresh-btn:hover{border-color:var(--teal);color:var(--teal)}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.last-updated{font-family:var(--fm);font-size:10px;color:var(--t3);flex-shrink:0}

.ctrl{padding:9px 18px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--b1);background:var(--s1);position:sticky;top:var(--hdr-h);z-index:99}
.ctrl input,.ctrl select{background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-family:var(--fm);font-size:12px;padding:5px 8px;border-radius:4px;outline:none}
.ctrl input{width:160px}.ctrl input:focus,.ctrl select:focus{border-color:var(--gold)}
.tf{padding:4px 11px;border-radius:14px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .15s;text-transform:uppercase}
.tf:hover{border-color:var(--gold);color:var(--gold)}.tf.on{background:var(--gold);border-color:var(--gold);color:#000}
.vbtn-wrap{display:flex;gap:1px;border:1px solid var(--b2);border-radius:5px;overflow:hidden;margin-left:6px}
.vbtn{padding:5px 14px;background:transparent;border:none;color:var(--t2);font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.vbtn:hover{color:var(--t1)}.vbtn.on{background:var(--gold);color:#000}
.csv-btn{margin-left:auto;padding:4px 10px;background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:4px;cursor:pointer;transition:all .15s}
.csv-btn:hover{border-color:var(--teal);color:var(--teal)}

.summ{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:1px;background:var(--b1);border-bottom:1px solid var(--b1)}
.sc{background:var(--s1);padding:11px 15px}
.scl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--t2);text-transform:uppercase;font-family:var(--fm);margin-bottom:3px}
.scv{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:-.02em}.scs{font-size:12px;color:var(--t1);margin-top:1px}
.rc{padding:5px 18px;font-size:11px;font-family:var(--fm);color:var(--t2)}

/* Loading / error state */
.state-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;text-align:center}
.state-icon{font-size:40px}
.state-title{font-size:18px;font-weight:700;color:var(--t1)}
.state-sub{font-size:13px;color:var(--t2);font-family:var(--fm);max-width:400px}
.state-progress{width:240px;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;margin-top:4px}
.state-bar{height:100%;background:var(--gold);border-radius:2px;animation:prog 2s ease-in-out infinite}
@keyframes prog{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.retry-btn{padding:7px 18px;background:var(--gold);color:#000;border:none;border-radius:5px;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;margin-top:6px}

/* Table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:6px 8px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--b2);cursor:pointer;white-space:nowrap;font-family:var(--fm);background:var(--s1);user-select:none;z-index:2}
thead th:hover{color:var(--gold)}.sa{color:var(--gold)!important}
tbody tr{cursor:pointer;transition:background .1s;scroll-margin-top:calc(var(--scroll-offset, 200px) + 8px)}
tbody tr:hover{background:var(--s2)}.ro{background:var(--s2)!important}
tr.gh{background:var(--s3);cursor:default;pointer-events:none}
tbody td{padding:7px 8px;border-bottom:1px solid var(--b1);vertical-align:middle;font-size:14px;font-weight:600}
.gh td{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);font-family:var(--fm);padding:4px 8px}
.rk{width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:var(--fm)}
.r1{background:var(--gold);color:#000}.r2{background:#9ca3af;color:#000}.r3{background:#b07c4e;color:#000}.rn{background:var(--s3);color:var(--t3)}
.nc b{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:.01em}.nc .ns{font-size:11px;color:var(--t2);font-family:var(--fm);margin-top:1px}
.pw{display:flex;flex-direction:column;gap:2px;min-width:58px}.pn{font-size:17px;font-weight:900;color:var(--gold);letter-spacing:-.01em}
.pb{height:4px;border-radius:2px;background:var(--b2);overflow:hidden;width:54px}.pf{height:100%;border-radius:2px}
.fh{background:var(--gold)}.fm2{background:var(--amber)}.fl{background:var(--t3)}

/* Tags */
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-family:var(--fm)}
.tg{background:rgba(56,161,105,.15);color:#68d391;border:1px solid rgba(56,161,105,.3)}
.tr{background:rgba(229,62,62,.12);color:#fc8181;border:1px solid rgba(229,62,62,.25)}
.tb{background:rgba(66,153,225,.12);color:var(--blue);border:1px solid rgba(66,153,225,.25)}
.ta{background:rgba(246,173,85,.12);color:var(--amber);border:1px solid rgba(246,173,85,.25)}
.tt{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.25)}
.tgr{background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.25)}
.tp{background:rgba(159,122,234,.12);color:var(--purple);border:1px solid rgba(159,122,234,.25)}

/* HR/9 badge */
.hr9{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:4px;font-family:var(--fm);font-size:10px;font-weight:600}
.hr9-hot{background:rgba(229,62,62,.18);color:#fc8181;border:1px solid rgba(229,62,62,.3)}
.hr9-med{background:rgba(246,173,85,.14);color:var(--amber);border:1px solid rgba(246,173,85,.25)}
.hr9-cold{background:rgba(56,161,105,.14);color:#68d391;border:1px solid rgba(56,161,105,.25)}

/* ISO badge */
.iso{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:4px;font-family:var(--fm);font-size:10px;font-weight:600}
.iso-e{background:rgba(240,165,0,.18);color:var(--gold2);border:1px solid rgba(240,165,0,.35)}
.iso-g{background:rgba(66,153,225,.14);color:#90cdf4;border:1px solid rgba(66,153,225,.25)}
.iso-a{background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.25)}
.iso-l{background:rgba(229,62,62,.1);color:#fc8181;border:1px solid rgba(229,62,62,.2)}

/* Live indicator */
.live-indicator{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;color:var(--green);padding:2px 7px;background:rgba(56,161,105,.1);border:1px solid rgba(56,161,105,.25);border-radius:10px}
.confirmed-badge{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm);font-size:10px;color:var(--teal);padding:1px 6px;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.2);border-radius:3px}
.projected-badge{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm);font-size:10px;color:var(--amber);padding:1px 6px;background:rgba(246,173,85,.1);border:1px solid rgba(246,173,85,.2);border-radius:3px}

/* Detail expand */
.dr td{padding:0!important;background:var(--s3)}
.di{padding:11px 15px 15px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:580px){.di{grid-template-columns:1fr}}
.dl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-family:var(--fm);margin-bottom:6px}
.fr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--b1);gap:6px}
.fr:last-child{border-bottom:none}.fn{font-size:12px;color:var(--t1);font-weight:500}
.fp{font-size:11px;font-weight:700;color:var(--green);font-family:var(--fm)}
.fn2{font-size:11px;font-weight:700;color:var(--red);font-family:var(--fm)}
.fne{font-size:11px;font-weight:700;color:var(--t3);font-family:var(--fm)}
.ft{display:flex;justify-content:space-between;align-items:center;padding-top:7px;margin-top:3px;border-top:1px solid var(--b2)}
.ftl{font-size:11px;font-weight:600;color:var(--t2)}.ftv{font-size:18px;font-weight:800;color:var(--gold);font-family:var(--fm)}
.wx-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.wc{background:var(--bg);border:1px solid var(--b2);border-radius:4px;padding:4px 8px;text-align:center;min-width:64px}
.wv{font-size:13px;font-weight:700;color:var(--t1)}.wl{font-size:10px;color:var(--t3);margin-top:1px;font-family:var(--fm)}
.ar-row{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid var(--b1)}
.ar-row:last-child{border-bottom:none}.ar-name{font-size:11px;color:var(--t2);width:100px;flex-shrink:0}
.ar-bg{flex:1;height:3px;border-radius:2px;background:var(--b2);overflow:hidden}
.ar-fill{height:100%;border-radius:2px;background:var(--t3)}.ar-val{font-size:10px;color:var(--t3);width:84px;text-align:right;font-family:var(--fm);flex-shrink:0}
.emp{text-align:center;padding:36px;color:var(--t3);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* Game view */
.gv-wrap{padding:12px 16px 20px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:10px}
.gcard{background:var(--s1);border:1px solid var(--b1);border-radius:9px;overflow:hidden;transition:border-color .15s}
.gcard:hover{border-color:var(--b3)}
.gcard-hdr{padding:9px 13px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:flex-start}
.gcard-matchup{font-size:15px;font-weight:800;color:var(--t1)}
.gcard-meta{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--fm)}
.gcard-time{font-size:11px;font-weight:700;color:var(--gold);font-family:var(--fm);text-align:right;flex-shrink:0}
.gcard-wx{padding:6px 13px;background:var(--s2);border-bottom:1px solid var(--b1);font-size:11px;font-family:var(--fm);color:var(--t2);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.gcard-wx span{color:var(--t1);font-weight:600}
.gcard-pitchers{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b1)}
.p-side{background:var(--s1);padding:7px 11px}
.p-side+.p-side{border-left:1px solid var(--b1)}
.p-team{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-family:var(--fm);margin-bottom:2px}
.p-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:2px}
.p-stats{font-size:10px;color:var(--t3);font-family:var(--fm)}.p-badges{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.gcard-threats{padding:9px 13px}
.threat-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-family:var(--fm);margin-bottom:5px}
.threat-row{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid var(--b1);cursor:pointer;border-radius:3px;transition:background .1s}
.threat-row:hover{background:var(--s2)}.threat-row:last-child{border-bottom:none}
.threat-rk{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--fm);flex-shrink:0}
.threat-name{flex:1;font-size:12px;color:var(--t1);font-weight:600}
.threat-meta{font-size:10px;color:var(--t3);font-family:var(--fm)}
.tbar{width:64px;height:3px;border-radius:2px;background:var(--b2);overflow:hidden}
.tbar-f{height:100%;border-radius:2px;background:var(--gold)}
.threat-pct{font-size:13px;font-weight:800;color:var(--gold);font-family:var(--fm);min-width:36px;text-align:right}
.gcard-footer{padding:6px 13px;border-top:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.gcard-avg{font-size:11px;color:var(--t3);font-family:var(--fm)}
.exp-btn{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--fd);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.exp-btn:hover{border-color:var(--gold);color:var(--gold)}
.gcard-exp{background:var(--s2);border-top:1px solid var(--b1);padding:0 13px 9px}
.exp-tl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-family:var(--fm);margin:7px 0 3px}
.mini-row{display:flex;align-items:center;gap:5px;padding:2px 3px;border-radius:3px;cursor:pointer;transition:background .1s}
.mini-row:hover{background:var(--bg)}
.mini-ord{font-size:9px;color:var(--t3);font-family:var(--fm);width:12px;flex-shrink:0}
.mini-name{flex:1;font-size:11px;color:var(--t1);font-weight:600}
.mini-badges{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.mini-pct{font-size:12px;font-weight:800;color:var(--gold);font-family:var(--fm);min-width:34px;text-align:right}
.mbar{width:40px;height:3px;border-radius:2px;background:var(--b2);overflow:hidden}
.mbar-f{height:100%;border-radius:2px}
.sdiv{height:1px;background:var(--b2);margin:5px 0}

/* Auto-refresh countdown */
.countdown{font-family:var(--fm);font-size:10px;color:var(--t3)}
.countdown.soon{color:var(--amber)}
/* Refresh panel */
.refresh-panel{
  display:flex;align-items:center;gap:10px;padding:7px 18px;
  background:var(--s2);border-bottom:1px solid var(--b1);
  font-family:var(--fm);font-size:11px;flex-wrap:wrap;
}
.rp-source{color:var(--t2)}.rp-source span{color:var(--t1);font-weight:600}
.rp-bar{flex:1;height:2px;background:var(--b2);border-radius:1px;overflow:hidden;min-width:60px;max-width:200px}
.rp-fill{height:100%;border-radius:1px;background:var(--teal);transition:width .5s linear}
.rp-next{color:var(--t3)}
.rp-btn{padding:2px 8px;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--fm);font-size:10px;cursor:pointer;transition:all .15s}
.rp-btn:hover{border-color:var(--teal);color:var(--teal)}
.rp-btn:disabled{opacity:.4;cursor:not-allowed}
.rp-livepill{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.rp-live{background:rgba(56,161,105,.15);color:#68d391;border:1px solid rgba(56,161,105,.3)}
.rp-stale{background:rgba(246,173,85,.12);color:var(--amber);border:1px solid rgba(246,173,85,.25)}
.rp-blocked{background:rgba(229,62,62,.1);color:#fc8181;border:1px solid rgba(229,62,62,.2)}
.rp-checking{background:rgba(45,212,191,.1);color:var(--teal);border:1px solid rgba(45,212,191,.2);animation:rpblink .8s infinite}
@keyframes rpblink{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Top Targets view ────────────────────────────────────────── */
.targets-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.target-hero{display:flex;gap:13px;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
.target-hero:hover{border-color:var(--gold)}
.th-rank{font-size:24px;padding-top:2px;flex-shrink:0}
.th-body{flex:1;min-width:0}
.th-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.th-name{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:.01em}
.th-meta{font-size:11px;color:var(--t2);font-family:var(--fm);margin-top:2px}
.th-pct{font-size:26px;font-weight:900;color:var(--gold);font-family:var(--fm);flex-shrink:0;letter-spacing:-.02em}
.th-score-total{display:flex;align-items:baseline;gap:4px;margin-bottom:8px}
.th-pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
@media(max-width:600px){.th-pillars{grid-template-columns:repeat(2,1fr)}}
.th-pillar{display:flex;flex-direction:column;gap:3px}
.th-plabel{font-size:10px;font-weight:600;color:var(--t3);font-family:var(--fm);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.th-pval{font-size:11px;font-weight:700;color:var(--t2);font-family:var(--fm);text-align:right}
.th-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.th-pitcher{font-size:11px;color:var(--t2);font-family:var(--fm)}
.th-pitcher b{color:var(--t1)}
.targets-list{display:flex;flex-direction:column;gap:1px;background:var(--b1);border-radius:7px;overflow:hidden;margin-bottom:16px}
.target-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s1);cursor:pointer;transition:background .1s}
.target-row:hover{background:var(--s2)}
.tr-body{flex:1;min-width:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">⚾ HR<span>prob</span></div>
  <div class="hdr-date" id="hdr-date">—</div>

function getSlateDate() {
  const now = new Date();
  // Get current ET date string and hour
  const etDateStr = now.toLocaleDateString('en-US', {timeZone:'America/New_York', year:'numeric', month:'2-digit', day:'2-digit'});
  const etHourStr = now.toLocaleString('en-US', {timeZone:'America/New_York', hour:'numeric', hour12:false});
  const etHour = parseInt(etHourStr) || 0;
  // Parse ET date parts directly (MM/DD/YYYY format)
  const [mm, dd, yyyy] = etDateStr.split('/').map(Number);
  const d = new Date(yyyy, mm - 1, dd);
  // Before 3am ET → still showing previous day's slate
  if (etHour < 3) d.setDate(d.getDate() - 1);
  return d;
}
function fmt(d) {
  const yyyy = d.getFullYear();
  const mm   = String(d.getMonth() + 1).padStart(2, '0');
  const dd   = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}
function fmtDisplay(d) {
  return d.toLocaleDateString('en-US', {weekday:'short', month:'long', day:'numeric', year:'numeric'});
}

// ═══════════════════════════════════════════════════════════════
//  STATCAST BATTER DATA — Barrel%, EV, HH%, xwOBA, ISO
//  Keyed by player name. Used to enrich API lineup data.
// ═══════════════════════════════════════════════════════════════
const BATTER_STATS = {};

function getBatterStats(name) {
  // Fuzzy match — strip accents, try partial
  const clean = s => s?.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const n = clean(name);
  for (const [k,v] of Object.entries(BATTER_STATS)) {
    if (clean(k) === n) return v;
  }
  // partial match on last name
  const last = n?.split(' ').pop();
  for (const [k,v] of Object.entries(BATTER_STATS)) {
    if (clean(k).endsWith(last)) return v;
  }
  return {ev:88,ba:7,hh:38,xw:0.32,iso:.150,bats:"R"};
}

// ═══════════════════════════════════════════════════════════════
//  HOT BAT DATA
// ═══════════════════════════════════════════════════════════════
const HOT_BATS = {};

function hotBatFactor(name) {
  const clean = s => s?.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const n = clean(name);
  let d = null;
  for (const [k,v] of Object.entries(HOT_BATS)) {
    if (clean(k) === n) { d = v; break; }
  }
  if (!d) return {factor:0, hrSzn:null, hrL10:null, hot:false, note:""};
  const l10F    = (d.hrL10||0) * 0.004;
  const streakF = d.hot ? 0.008 : (!d.hot && d.hrL10===0) ? -0.006 : 0;
  return {factor: l10F + streakF, hrSzn:d.hrSzn, hrL10:d.hrL10, hot:d.hot, note:d.note};
}

// ═══════════════════════════════════════════════════════════════
//  HR PROBABILITY MODEL
// ═══════════════════════════════════════════════════════════════
function hrProb(bStats, bats, park, wx, pitcher) {
  const ev=bStats.ev||88, brl=bStats.ba||7, hh=bStats.hh||38;
  const base = 0.04 + (brl-5)*0.006 + (ev-85)*0.003 + (hh-30)*0.001;
  const dome  = wx.d===999;
  const isOut = !dome && wx.d>=135 && wx.d<225;
  const isIn  = !dome && (wx.d>=315 || wx.d<45);
  const wF  = dome ? 0 : isOut ? wx.w*0.006 : isIn ? -wx.w*0.005 : wx.w*0.001;
  const tF  = (wx.t-72)*0.0015, hF = dome ? 0 : (wx.h-50)*0.0004;
  const aF  = park.elev/5280*0.08, dF = (park.dim-1)*0.15;
  const rF  = park.roof==="fixed" ? -0.015 : park.roof==="retractable" ? -0.005 : 0;
  const hr9F = pitcher ? ((pitcher.hr9||1.2)-1.2)*0.018 : 0;
  let pF=0, plF=0, arF=0;
  if (pitcher) {
    const wh=(pitcher.whiff||25)/30, er=Math.max(0,(5-(pitcher.xera||pitcher.era||4))/5);
    pF = -((wh*0.6+er*0.4)*0.028);
    const bh = bats==="S" ? (pitcher.hand==="R"?"L":"R") : bats;
    plF = bh !== pitcher.hand ? 0.018 : -0.018;
    if (pitcher.arsenal?.length) {
      let f=0,tot=0;
      pitcher.arsenal.forEach(a=>{const s=(SP[a.type]||{})[bh]||1; f+=s*(a.usage/100); tot+=a.usage/100;});
      arF = tot>0 ? (f/tot-1)*0.035 : 0;
    }
  }
  const hb = hotBatFactor(bStats._name||"");
  const hbF = hb.factor;
  const pct = Math.max(0.5, Math.min(45, (base+wF+tF+hF+aF+dF+rF+hr9F+pF+plF+arF+hbF)*100));
  return {
    pct:+pct.toFixed(1), base:+(base*100).toFixed(1),
    wF:+(wF*100).toFixed(2), tF:+(tF*100).toFixed(2), hF:+(hF*100).toFixed(2),
    aF:+(aF*100).toFixed(2), dF:+(dF*100).toFixed(2), rF:+(rF*100).toFixed(2),
    hr9F:+(hr9F*100).toFixed(2), pF:+(pF*100).toFixed(2), plF:+(plF*100).toFixed(2),
    arF:+(arF*100).toFixed(2), hbF:+(hbF*100).toFixed(2),
    hrSzn:hb.hrSzn, hrL10:hb.hrL10, hotStreak:hb.hot, hotNote:hb.note,
    matchup:+((plF+arF)*100).toFixed(2), parkWx:+((wF+tF+hF+aF+dF+rF)*100).toFixed(2),
  };
}

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
function hr9Badge(v) {
  if (v==null) return '';
  const cls = v>=1.5?'hr9-hot':v>=1.0?'hr9-med':'hr9-cold';
  const icon = v>=1.5?'💣':v>=1.0?'⚡':'🔒';
  return `<span class="hr9 ${cls}">${icon} ${v.toFixed(2)}/9</span>`;
}
function isoBadge(v) {
  if (v==null) return '';
  const cls = v>=.250?'iso-e':v>=.180?'iso-g':v>=.120?'iso-a':'iso-l';
  const lbl = v>=.250?'Elite':v>=.180?'Solid':v>=.120?'Avg':'Weak';
  return `<span class="iso ${cls}">ISO ${v.toFixed(3)} ${lbl}</span>`;
}

  LAA:'Angels',LAD:'Dodgers',MIA:'Marlins',MIL:'Brewers',
  MIN:'Twins',NYM:'Mets',NYY:'Yankees',OAK:'Athletics',
  PHI:'Phillies',PIT:'Pirates',SD:'Padres',SEA:'Mariners',
  SF:'Giants',STL:'Cardinals',TB:'Rays',TEX:'Rangers',
  TOR:'Blue Jays',WSH:'Nationals',KCR:'Royals',SFG:'Giants',
  SDP:'Padres',TBR:'Rays',WSN:'Nationals',CHW:'White Sox',AZ:'Diamondbacks'
};
function espnTeam(abbr){return ESPN_TEAM[abbr?.toUpperCase()]||abbr||'';}

function parseESPNEvent(ev){
  const comp=ev.competitions?.[0]; if(!comp) return null;
  const away=comp.competitors?.find(c=>c.homeAway==='away');
  const home=comp.competitors?.find(c=>c.homeAway==='home');
  if(!away||!home) return null;
  const awayName=espnTeam(away.team?.abbreviation);
  const homeName=espnTeam(home.team?.abbreviation);
  if(!PARKS[homeName]&&!PARKS[awayName]) return null;
  let timeStr='TBD';
  try{const d=new Date(ev.date);timeStr=d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true})+' ET';}catch(_){}
  let awayProb=null,homeProb=null;
  (comp.probables||[]).forEach(p=>{
    const name=p.athlete?.fullName||p.athlete?.displayName||null; if(!name) return;
    const obj={name,hand:p.athlete?.throwHand||null,era:parseFloat(p.stats?.find(s=>s.name==='ERA')?.displayValue)||null};
    if(p.homeAway==='away') awayProb=obj; else homeProb=obj;
  });
  const parseLineup=side=>(comp.lineup||[]).filter(l=>l.homeAway===side)
    .sort((a,b)=>(a.battingOrder||99)-(b.battingOrder||99))
    .map(l=>({name:l.athlete?.fullName||l.athlete?.displayName||'',battingOrder:l.battingOrder||0,position:l.position?.abbreviation||'',batSide:l.athlete?.batHand||'R'}))
    .filter(l=>l.name);
  return{gamePk:parseInt(ev.id),status:ev.status?.type?.shortDetail||'Scheduled',time:timeStr,
    awayTeamName:awayName,homeTeamName:homeName,
    awayProbable:awayProb,homeProbable:homeProb,
    awayLineup:parseLineup('away'),homeLineup:parseLineup('home'),
    awayScore:away.score,homeScore:home.score};
}

function mergeESPN(base,espnGames){
  const games=base.games.map(g=>{
    const live=espnGames.find(e=>e.awayTeamName===g.awayTeamName&&e.homeTeamName===g.homeTeamName);
    if(!live) return g;
    return{...g,time:live.time||g.time,status:live.status,
      awayProbable:live.awayProbable?.name?live.awayProbable:g.awayProbable,
      homeProbable:live.homeProbable?.name?live.homeProbable:g.homeProbable,
      awayLineup:live.awayLineup?.length?live.awayLineup:g.awayLineup,
      homeLineup:live.homeLineup?.length?live.homeLineup:g.homeLineup,
      awayScore:live.awayScore,homeScore:live.homeScore};
  });
  return{...base,games};
}

// ── Live lineup fetch — MLB.com (official source) ──────────────────
// Fetches https://www.mlb.com/starting-lineups and parses confirmed lineups.
// Falls back to allorigins/corsproxy if direct fetch is blocked by CORS.
async function fetchMLBLineups() {
  // mlb.com/starting-lineups/YYYY-MM-DD returns static HTML with full lineups
  // This date-specific URL bypasses the JS-rendering issue on the base URL
  // Format confirmed working: returns lineup cards directly in HTML source
  const url = `https://www.mlb.com/starting-lineups/${SLATE_ISO}`;
  const PROXIES = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
  ];

  let html = null;
  try {
    const r = await fetch(url, { cache:'no-store', signal:AbortSignal.timeout(10000) });
    if (r.ok) html = await r.text();
  } catch(_) {}

  if (!html) {
    for (const fn of PROXIES) {
      try {
        const r = await fetch(fn(url), { signal:AbortSignal.timeout(14000) });
        if (!r.ok) continue;
        const d = await r.json().catch(() => null);
        if (d) { html = d.contents || d.body || null; }
        else { html = await r.text().catch(() => null); }
        if (html?.includes('Lineup')) break;
      } catch(_) {}
    }
  }
  if (!html) return null;

  // Parse lineup format: "1. [Player Name](url) (R/L/S) POS"
  // Also handles compact: "P Name (R) POS"
  const lineups = {};
  const TEAM_ABBRS = {
    'CLE':'Guardians','DET':'Tigers','PIT':'Pirates','STL':'Cardinals',
    'NYM':'Mets','WSH':'Nationals','ATL':'Braves','MIA':'Marlins',
    'TOR':'Blue Jays','NYY':'Yankees','ATH':'Athletics','LAA':'Angels',
    'COL':'Rockies','ARI':'Diamondbacks','OAK':'Athletics',
    'CHC':'Cubs','CIN':'Reds','MIL':'Brewers','PHI':'Phillies',
    'LAD':'Dodgers','SD':'Padres','SF':'Giants','SEA':'Mariners',
    'HOU':'Astros','KC':'Royals','BOS':'Red Sox','MIN':'Twins',
    'TEX':'Rangers','TB':'Rays','BAL':'Orioles','CWS':'White Sox',
  };
  const FULL_NAMES = {
    'Cardinals':'Cardinals','Yankees':'Yankees','Guardians':'Guardians',
    'Tigers':'Tigers','Pirates':'Pirates','Nationals':'Nationals',
    'Mets':'Mets','Braves':'Braves','Marlins':'Marlins',
    'Blue Jays':'Blue Jays','Athletics':'Athletics','Angels':'Angels',
    'Rockies':'Rockies','Diamondbacks':'Diamondbacks',
  };

  // Split by game sections — each section starts with a team @ team header
  // Look for lineup blocks: numbered player lists
  const sections = html.split(/\n(?=##|\d+\.\s|[A-Z]{2,3}\s+Lineup)/);

  let currentTeam = null;
  const lineupMap = {};

  for (const line of html.split('\n')) {
    // Team lineup header: "STL Lineup" or "Cardinals Lineup" or "NYY Lineup"
    const teamHeader = line.match(/^([A-Z]{2,3})\s+Lineup/) ||
                       line.match(/^([A-Za-z ]+)\s+Lineup/);
    if (teamHeader) {
      const key = teamHeader[1].trim();
      currentTeam = TEAM_ABBRS[key] || FULL_NAMES[key] || null;
      if (!lineupMap[currentTeam]) lineupMap[currentTeam] = [];
      continue;
    }

    if (!currentTeam) continue;

    // Full format: "1. [Player Name](url) (R) SS"
    const full = line.match(/^(\d+)\.\s+\[([^\]]+)\]\([^)]+\)\s+\(([RLS])\)\s+([A-Z0-9/]+)/);
    if (full) {
      const [,order,name,hand,pos] = full;
      lineupMap[currentTeam].push({
        name: name.trim(), battingOrder: parseInt(order),
        position: pos.trim(), batSide: hand, source: 'live',
      });
      continue;
    }

    // Compact format: "B Rice (L) DH" or "Ben Rice (L) DH"
    const compact = line.match(/^([A-Z][A-Za-z\s]+)\s+\(([RLS])\)\s+([A-Z0-9/]+)/);
    if (compact && lineupMap[currentTeam].length < 9) {
      const [,name,hand,pos] = compact;
      lineupMap[currentTeam].push({
        name: name.trim(), battingOrder: lineupMap[currentTeam].length + 1,
        position: pos.trim(), batSide: hand, source: 'live',
      });
    }
  }

  // Only include confirmed lineups (8-9 players)
  Object.entries(lineupMap).forEach(([team, players]) => {
    if (players.length >= 8) lineups[team] = players;
  });

  const n = Object.keys(lineups).length;
  if (n > 0) { console.log('MLB.com parsed:', n, 'lineups'); return lineups; }
  console.warn('MLB.com: parse returned 0 lineups');
  return null;
}


// Keep FTA as secondary fallback
async function fetchFTALineups() {
  const FTA_URL = 'https://fantasyteamadvice.com/mlb/starting-lineups';
  const PROXIES = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  ];
  let html = null;
  try {
    const r = await fetch(FTA_URL, {signal:AbortSignal.timeout(8000),cache:'no-store'});
    if (r.ok) html = await r.text();
  } catch(_) {}
  if (!html) {
    for (const fn of PROXIES) {
      try {
        const r = await fetch(fn(FTA_URL), {signal:AbortSignal.timeout(12000)});
        if (!r.ok) continue;
        const d = await r.json();
        html = d.contents || d.body || null;
        if (html) break;
      } catch(_) {}
    }
  }
  if (!html) return null;
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const text = (doc.body?.innerText || doc.body?.textContent || '');
    const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
    const teamLineups = {};
    let currentTeam = null;
    const TEAM_PAT = /^(Yankees|Red Sox|Blue Jays|Orioles|Rays|Guardians|Tigers|White Sox|Royals|Twins|Astros|Angels|Athletics|Mariners|Rangers|Mets|Phillies|Braves|Nationals|Marlins|Cubs|Reds|Brewers|Cardinals|Pirates|Dodgers|Giants|Padres|Rockies|Diamondbacks)$/i;
    for (const line of lines) {
      if (TEAM_PAT.test(line)) { currentTeam = line; continue; }
      if (!currentTeam) continue;
      const m = line.match(/^(\d)\s+([A-Z1-9/]+)\s+(.+)/);
      if (m) {
        const [,num,pos,rawName] = m;
        const name = rawName.replace(/[\u{1F300}-\u{1FFFF}]/gu,'').replace(/[\u{1F004}\u{1F0CF}\u{1F170}-\u{1F171}\u{1F17E}-\u{1F17F}]/gu,'').trim();
        if (!teamLineups[currentTeam]) teamLineups[currentTeam] = [];
        if (teamLineups[currentTeam].length < 9)
          teamLineups[currentTeam].push({name, battingOrder:parseInt(num), position:pos, batSide:'R'});
      }
    }
    return Object.keys(teamLineups).length > 0 ? teamLineups : null;
  } catch(e) { return null; }
}

function mergeLineups(lineupMap) {
  if (!lineupMap) return 0;
  let n = 0;
  liveGames.forEach(g => {
    const find = name => {
      if (lineupMap[name]) return name;
      // Try without spaces (RedSox, BlueJays etc)
      const noSpace = name.replace(/\s+/g,'');
      if (lineupMap[noSpace]) return noSpace;
      // Last word match
      return Object.keys(lineupMap).find(k =>
        k.toLowerCase() === name.toLowerCase() ||
        name.toLowerCase().endsWith(k.toLowerCase().split(' ').pop())
      );
    };
    const ak = find(g.awayTeamName), hk = find(g.homeTeamName);
    if (ak && lineupMap[ak]?.length >= 8) { g.awayLineup = lineupMap[ak]; n++; }
    if (hk && lineupMap[hk]?.length >= 8) { g.homeLineup = lineupMap[hk]; n++; }
  });
  return n;
}

async function tryESPNEnrich(date) {
  // ── Step 1: MLB.com starting lineups (primary, official source) ──
  console.log('Fetching MLB.com lineups...');
  const mlbLineups = await fetchMLBLineups();
  if (mlbLineups && Object.keys(mlbLineups).length > 0) {
    const n = mergeLineups(mlbLineups);
    console.log('MLB.com merged:', n, 'teams confirmed');
  } else {
    // ── Step 2: FTA as fallback if MLB.com parse fails ──
    console.log('MLB.com unavailable, trying FTA...');
    const ftaLineups = await fetchFTALineups();
    if (ftaLineups) {
      const n = mergeLineups(ftaLineups);
      console.log('FTA merged:', n, 'teams');
    }
  }

  // ── Step 3: ESPN for game status updates ──
  const d = date.replace(/-/g,'');
  const urls = [
    `https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard?dates=${d}&limit=30`,
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url, {
        headers: {'Accept':'application/json','Cache-Control':'no-cache'},
        cache: 'no-store', signal: AbortSignal.timeout(10000)
      });
      if (!res.ok) continue;
      const data = await res.json();
      const events = data.events || [];
      if (!events.length) continue;
      const games = events.map(parseESPNEvent).filter(Boolean)
        .filter(g => PARKS[g.homeTeamName] || PARKS[g.awayTeamName]);
      if (games.length) { console.log('ESPN enriched:', games.length); return games; }
    } catch(e) { console.warn('ESPN:', e.message); }
  }
  try {
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(urls[0])}`;
    const res = await fetch(proxy, {signal: AbortSignal.timeout(15000)});
    if (res.ok) {

  return mlbLineups ? [] : null;
}

let statcastLoadedAt = null;

function mergeStatcast(data) {
  if (!data?.batters) return;
  let n = 0;
  for (const [name, s] of Object.entries(data.batters)) {
    if ((s.ev||0) > 0) {
      BATTER_STATS[name] = {
        ev:+s.ev.toFixed(1), ba:+s.ba.toFixed(1), hh:+s.hh.toFixed(1),
        xw:+s.xw.toFixed(3), iso:+s.iso.toFixed(3), pa:s.pa||0,
        bats: BATTER_STATS[name]?.bats || 'R',
      };
      n++;
    }
  }
  if (data.pitchers) {
    for (const [name, s] of Object.entries(data.pitchers)) {
      const ex = PITCHER_DB[name] || {};
      PITCHER_DB[name] = { ...ex, xera:+s.xera.toFixed(2), whiff:+s.whiff.toFixed(1),
        hr9:+s.hr9.toFixed(2), arsenal:s.arsenal?.length?s.arsenal:(ex.arsenal||[]) };
    }
  }
  statcastLoadedAt = Date.now();
  console.log('Statcast:', n, 'batters merged');
  if (liveGames.length > 0) {
    const {rows} = buildRowsFixed(liveGames);
    allRows = rows;
    if (currentView==='game') renderGameView();
    else if (currentView==='targets') renderTargets();
    else filt();
    const lu = document.getElementById('last-updated');
    if (lu) lu.textContent = 'Statcast live · ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }
}

async function loadStatcastBackground() {
  if (statcastLoadedAt && Date.now()-statcastLoadedAt < 3600000) return;
  try {
    const r = await fetch('/api/statcast',{cache:'no-store',signal:AbortSignal.timeout(30000)});
    if (r.ok) mergeStatcast(await r.json());
  } catch(e) { console.warn('Statcast:', e.message); }
}


function buildGamesFromPitchers(pitchers) {
  if (!pitchers?.length) return [];
  return pitchers.map(g => ({
    gamePk:       g.gamePk,
    time:         new Date(g.gameTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET',
    awayTeamName: g.awayTeam,
    homeTeamName: g.homeTeam,
    awayProbable: _P(g.awayPitcher||'TBD','R', PITCHER_DB[g.awayPitcher]?.xera||4.50),
    homeProbable: _P(g.homePitcher||'TBD','R', PITCHER_DB[g.homePitcher]?.xera||4.50),
    awayLineup:[], homeLineup:[],
  })).filter(g => PARKS[g.homeTeamName] || PARKS[(g.homeTeamName||'').replace(/\s+/g,'')]
               || PARKS[g.awayTeamName] || PARKS[(g.awayTeamName||'').replace(/\s+/g,'')]);
}
async function fetchMLBViaClaudeAPI(date) {
  try {
    const r = await fetch('/api/slate', {cache:'no-store', signal:AbortSignal.timeout(12000)});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const slate = await r.json();

    // Sync date from server
    if (slate.date) syncSlateDate(slate.date);

    // Merge weather
    if (slate.weather) {
      for (const [t,wx] of Object.entries(slate.weather)) {
        if (WX[t]) Object.assign(WX[t], wx);
      }
    }

    // Merge confirmed lineups
    if (slate.lineups && Object.keys(slate.lineups).length > 0) {
      const tagged = {};
      for (const [t,players] of Object.entries(slate.lineups)) {
        tagged[t] = players.map(p => ({...p, source:'live'}));
      }
      mergeLineups(tagged);
    }

    // Build games from pitcher schedule
    const games = buildGamesFromPitchers(slate.pitchers);
    if (!games.length) throw new Error('No games in /api/slate response');

    // Load Statcast in background (non-blocking)
    loadStatcastBackground().catch(()=>{});

    return {
      date: slate.date || date,
      games,
      source: 'api',
      confirmed: Object.keys(slate.lineups||{}).length,
    };
  } catch(err) {
    console.error('fetchMLBViaClaudeAPI:', err.message);
    return {date, games:[], source:'error', error:err.message};
  }
}

async function fetchMLBViaClaudeAPI(date) {
  const builtInDate = BUILT_IN_SLATE.date;
  const isStale = builtInDate !== date;
  if (!isStale) {
    return { date, games: BUILT_IN_SLATE.games, source: 'builtin' };
  }
  // Stale — return baked data with stale flag; Update slate button will appear
  return { date, games: BUILT_IN_SLATE.games, source: 'stale', builtInDate, requestedDate: date };
}

function windLabel(windDir, city) {
  const orientation = PARK_ORIENTATION[city];
  if (!orientation || orientation === 999) return 'dome';
  // Angular difference between wind direction and outfield direction
  // Wind blowing FROM orientation = blowing IN (headwind for batters)
  // Wind blowing FROM orientation+180 = blowing OUT (tailwind = more HRs)
  const diff = ((windDir - orientation) + 360) % 360;
  if (diff >= 150 && diff <= 210) return 'blowing in';   // headwind
  if (diff >= 330 || diff <= 30)  return 'blowing out';  // tailwind
  return 'crosswind';
}

const WX_CODES = [
  [0,1,"Clear"],[2,3,"Partly cloudy"],[45,48,"Foggy"],
  [51,67,"Rainy"],[71,79,"Snow"],[80,82,"Showers"],[95,99,"Thunderstorm"]
];
function wxDesc(code) {
  for (const [lo,hi,label] of WX_CODES) if (code>=lo && code<=hi) return label;
  return "Overcast";
}

async function fetchLiveWeather() {
  const CARDS = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  function wxLabel2(code) {
    if(code<=1)return"Clear";if(code<=3)return"Partly cloudy";
    if(code<=49)return"Foggy";if(code<=69)return"Rainy";
    if(code<=79)return"Snow";return"Thunderstorm";
  }

  // Only open-air parks with known coordinates
  const openCities = Object.entries(CITY_COORDS).filter(([city]) => {
    const wx = WX[city];
    return wx && wx.d !== 999;
  });
  if (!openCities.length) return 0;

  // Show loading indicator
  const lu = document.getElementById('last-updated');
  const rpSrc = document.getElementById('rp-source');
  if (lu) lu.textContent = `Fetching weather (0/${openCities.length})…`;

  let updated = 0;
  let done = 0;

  // Fetch each city individually — parallel with progress tracking
  await Promise.allSettled(openCities.map(async ([city, [lat, lon]]) => {
    const url = `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${lat}&longitude=${lon}` +
      `&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code` +
      `&temperature_unit=fahrenheit&wind_speed_unit=mph` +
      `&timezone=America%2FNew_York&forecast_days=1`;
    try {
      const res = await fetch(url, { cache:'no-store', signal: AbortSignal.timeout(8000) });
      if (!res.ok) return;
      const d = await res.json();
      const hourly = d.hourly;
      if (!hourly?.time?.length) return;

      // Pick the game-time hour: 17:00 covers both afternoon and evening starts
      const targetHour = 17;
      let hi = hourly.time.findIndex(t => parseInt(t.split('T')[1]||'0') >= targetHour);
      if (hi < 0) hi = hourly.time.length - 1;

      const t    = Math.round(hourly.temperature_2m[hi]);
      const h    = Math.round(hourly.relative_humidity_2m[hi]);
      const w    = Math.round(hourly.wind_speed_10m[hi]);
      const wdir = Math.round(hourly.wind_direction_10m[hi]);
      const code = hourly.weather_code[hi];
      const card = CARDS[Math.round(wdir/22.5)%16];
      const lbl  = windLabel(wdir, city);
      const cond = wxLabel2(code);

      WX[city] = { t, h, w, d: wdir, c: card, l: lbl, s: cond, src: 'live' };
      if (city === 'Bronx')      WX['Bronx NY']     = WX[city];
      if (city === 'Washington') WX['Washington DC'] = WX[city];
      updated++;
    } catch(e) {
      console.warn(`Wx ${city}:`, e.message);
    } finally {
      done++;
      if (lu) lu.textContent = `Fetching weather (${done}/${openCities.length})…`;
    }
  }));

  // Rebuild and re-render with fresh weather
  if (updated > 0) {
    console.log(`Open-Meteo: ${updated}/${openCities.length} cities updated`);
    if (liveGames.length > 0) {
      const { rows } = buildRowsFixed(liveGames);
      allRows = rows;
      if (currentView === 'game') renderGameView(); else filt();
    }
    const time = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    if (lu) lu.textContent = `Live wx · ${updated} parks · ${time}`;
    if (rpSrc) {
      const conf = liveGames.filter(g=>g.awayLineup?.length||g.homeLineup?.length).length;
      const pill = document.getElementById('rp-pill');
      const isLive = conf > 0;
      if (pill) { pill.className = `rp-livepill ${isLive?'rp-live':'rp-stale'}`; pill.textContent = isLive?'Live':'Built-in'; }
      rpSrc.innerHTML = `MLB.com · <span>${conf} confirmed</span> · wx live`;
    }
  } else {
    if (lu) lu.textContent = `Weather unavailable — using estimates`;
  }
  return updated;
}

  const liveRows   = allRows.filter(r=>r.source==='live').length;
  const bakedRows  = allRows.filter(r=>r.source==='baked').length;
  const liveGamesConfirmed  = liveGames.filter(g=>[...(g.awayLineup||[]),...(g.homeLineup||[])].some(p=>p.source==='live'||p.source==='confirmed')).length;
  const bakedGamesConfirmed = liveGames.filter(g=>g.awayLineup?.length&&[...(g.awayLineup||[])].every(p=>p.source==='baked')).length;

  }

function startProgressBar() {
  if (progressInterval) clearInterval(progressInterval);
  const fill = document.getElementById('rp-fill');
  const next = document.getElementById('rp-next');
  if (!fill || !next) return;
  progressInterval = setInterval(() => {
    if (!nextRefreshAt) return;
    const elapsed = Date.now() - (nextRefreshAt - REFRESH_INTERVAL_MS);
    const total   = REFRESH_INTERVAL_MS;
    const pct     = Math.min(100, (elapsed / total) * 100);
    fill.style.width = (100 - pct) + '%';
    const secsLeft = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
    const mins = Math.floor(secsLeft / 60);
    const secs = secsLeft % 60;
    next.textContent = secsLeft > 0
      ? `Next check in ${mins}:${String(secs).padStart(2,'0')}`
      : 'Refreshing…';
    // Also update header countdown
    const hdrCountdown = document.getElementById('countdown');
    if (hdrCountdown) {
      hdrCountdown.textContent = secsLeft > 0 ? `↻ ${mins}:${String(secs).padStart(2,'0')}` : '';
      hdrCountdown.className = `countdown${secsLeft < 60 ? ' soon' : ''}`;
    }
  }, 1000);
}

// ═══════════════════════════════════════════════════════════════
//  PITCHER STATS ENRICHMENT
//  We have ERA from API. Augment with HR/9, xERA, whiff%, arsenal
//  from our local knowledge base keyed by name.
// ═══════════════════════════════════════════════════════════════
const PITCHER_DB = {};

function enrichPitcher(apiPitcher) {
  if (!apiPitcher) return null;
  const clean = s => s?.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  let db = PITCHER_DB[apiPitcher.name];
  if (!db) {
    // Partial name match
    const n = clean(apiPitcher.name);
    for (const [k,v] of Object.entries(PITCHER_DB)) {
      if (clean(k) === n || clean(k).includes(n.split(' ').pop())) { db = v; break; }
    }
  }
  return {
    name:    apiPitcher.name,
    hand:    apiPitcher.hand || 'R',
    era:     apiPitcher.era  || 4.50,
    xera:    db?.xera  || null,
    whiff:   db?.whiff || 24,
    hr9:     db?.hr9   || 1.20,
    arsenal: db?.arsenal || [],
    record:  apiPitcher.wins != null ? `${apiPitcher.wins}-${apiPitcher.losses}` : null,
  };
}

// ═══════════════════════════════════════════════════════════════
//  BUILD ROWS FROM LIVE API GAME DATA
// ═══════════════════════════════════════════════════════════════
// Typical batting order starters keyed by team name — used when lineup not yet confirmed
// TYPICAL_LINEUPS removed — MLB.com is the only lineup source


// No projected lineups — only confirmed data from MLB.com
// Games without a posted lineup show as "Lineup pending" with no batter rows

function buildRowsFixed(games) {
  const rows = [];
  const teamSet = new Set();

  games.forEach(g => {
    const homeName = g.homeTeamName;
    const park = PARKS[homeName] || PARKS[homeName.replace(/\s+/g,'')] || PARKS["Yankees"];
    const wx   = getWx(park);
    const awayPitcher = enrichPitcher(g.awayProbable);
    const homePitcher = enrichPitcher(g.homeProbable);
    const timeStr = g.time || 'TBD';

    [[g.awayLineup||[], homePitcher, g.awayTeamName],
     [g.homeLineup||[], awayPitcher, g.homeTeamName]].forEach(([lineup, vspit, team]) => {
      teamSet.add(team);
      const isConfirmed = lineup.length > 0;
      const batters = isConfirmed ? lineup : (
        // No lineup yet — use top Statcast qualifiers ranked by power
        Object.entries(BATTER_STATS)
          .filter(([,s]) => (s.pa||0) >= 20 && (s.ev||0) > 83)
          .sort(([,a],[,b]) => ((b.ba||0)*2+(b.ev||88)/10) - ((a.ba||0)*2+(a.ev||88)/10))
          .slice(0,9)
          .map(([name,s],i) => ({name, battingOrder:i+1, position:'?', batSide:s.bats||'R', source:'projected'}))
      );
      batters.forEach((p, idx) => {
        const name = p.name || `${team} P${idx+1}`;
        const bs   = {...getBatterStats(name), _name: name};
        const bats = p.batSide || bs.bats || 'R';
        const h    = hrProb(bs, bats, park, wx, vspit);
        rows.push({
          name, bats, order: p.battingOrder||(idx+1),
          ev:bs.ev, barrel:bs.ba, hh:bs.hh, xwoba:bs.xw, iso:bs.iso,
          verified: isConfirmed, source: p.source||(isConfirmed?'confirmed':'projected'),
          ...h, team, park, wx, pitcher:vspit, game:g, timeStr,
        });
      });
    });
  });
  return {rows, teamSet};
}

async function fetchSlate(manual = false) {
  setApiStatus('loading', 'Fetching…');
  updateRefreshBtn(true);
  document.getElementById('state-view').style.display = 'flex';
  document.getElementById('player-view').style.display = 'none';
  document.getElementById('game-view').style.display = 'none';
  document.querySelector('#state-view .state-title').textContent = 'Fetching Today\'s MLB Slate';
  document.querySelector('#state-view .state-sub').textContent = "Loading today's slate…";

  try {
    const data = await fetchMLBViaClaudeAPI(SLATE_ISO);

    if (!data.games || data.games.length === 0) {
      throw new Error('No MLB games found for this date');
    }

    liveGames = data.games;
    const {rows, teamSet} = buildRowsFixed(liveGames);
    allRows = rows;

    // Populate team selector — use liveGames directly if no confirmed lineups yet
    const tSel = document.getElementById('tSel');
    const prev = tSel.value;
    tSel.innerHTML = '<option value="">All Teams</option>';
    const teamsToShow = teamSet.size > 0 ? [...teamSet].sort() :
      [...new Set(liveGames.flatMap(g=>[g.awayTeamName,g.homeTeamName]))].sort();
    teamsToShow.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      tSel.appendChild(o);
    });
    if (prev) tSel.value = prev;

    const confirmedGames = liveGames.filter(g=>g.awayLineup?.length||g.homeLineup?.length).length;
    const totalGames = liveGames.length;
    const isStale = data.source === 'stale' || data.source === 'baked';

    if (isStale) {
      setApiStatus('stale', `${liveGames.length} games · Statcast loading…`);
      // update btn always visible
      updateRefreshPanel('stale', 'stale', confirmedGames);
      const rpSrc = document.getElementById('rp-source');
      if (rpSrc) rpSrc.innerHTML =
        `<span style="color:var(--amber)">⚠ Data from ${data.builtInDate}</span> · Click ✦ above — sends fetch request to Claude`;
    } else {
      setApiStatus('stale', `Built-in · ${totalGames} games · fetching lineups…`);
      updateRefreshPanel('stale', 'builtin', confirmedGames);
    }

    document.getElementById('last-updated').textContent =
      `Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;

    // Attempt lineup enrichment from MLB.com / FTA
    tryESPNEnrich(SLATE_ISO).then(() => {
      const conf = liveGames.filter(g=>g.awayLineup?.length||g.homeLineup?.length).length;
      liveEnrichedCount = conf;
      const {rows:newRows} = buildRowsFixed(liveGames);
      allRows = newRows;
      const label = conf > 0
        ? `MLB.com · ${liveGames.length} games · ${conf} confirmed`
        : `${totalGames} games today · lineups pending`;
      setApiStatus(conf > 0 ? 'live' : 'stale', label);
      document.getElementById('last-updated').textContent =
        `Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
      updateRefreshPanel(conf > 0 ? 'live' : 'stale', 'mlb', conf);
      if(currentView==='game') renderGameView();
      else if(currentView==='targets') renderTargets();
      else filt();
    }).catch(() => {
      const conf = liveGames.filter(g=>g.awayLineup?.length||g.homeLineup?.length).length;
      updateRefreshPanel(conf > 0 ? 'live' : 'stale', 'mlb', conf);
    });
    scheduleRefresh();
    fetchLiveWeather(); // Fetch actual conditions from Open-Meteo

    document.getElementById('state-view').style.display = 'none';
    if (currentView === 'game') {
      document.getElementById('game-view').style.display = '';
      renderGameView();
    } else {
      document.getElementById('player-view').style.display = '';
      document.getElementById('player-thead').style.display = '';
      filt();
      setTimeout(updateOffsets, 50);
    }
  } catch (err) {
    console.error('Fetch error:', err);
    setApiStatus('error', `Error: ${err.message?.slice(0,40)}`);
    document.querySelector('#state-view .state-icon').textContent = '⚠️';
    document.querySelector('#state-view .state-title').textContent = 'Could Not Connect to Server';
    document.querySelector('#state-view .state-sub').textContent = 'Make sure hrprob3.vercel.app is deployed and /api/slate is responding.';
    document.querySelector('#state-view .state-progress').style.display = 'none';

    // Add retry button if not already there
    if (!document.getElementById('retry-btn')) {
      const btn = document.createElement('button');
      btn.id = 'retry-btn'; btn.className = 'retry-btn';
      btn.textContent = 'Retry'; btn.onclick = () => fetchSlate(true);
      document.getElementById('state-view').appendChild(btn);
    }
    document.getElementById('state-view').style.display = 'flex';
  } finally {
    updateRefreshBtn(false);
  }
}

function scheduleRefresh() {
  // Clear any existing timers
  if (refreshInterval)  clearInterval(refreshInterval);
  if (progressInterval) clearInterval(progressInterval);

  nextRefreshAt = Date.now() + REFRESH_INTERVAL_MS;

  // setInterval fires every 5 min to attempt ESPN enrichment
  refreshInterval = setInterval(async () => {
    nextRefreshAt = Date.now() + REFRESH_INTERVAL_MS;
    updateRefreshBtn(true);
    updateRefreshPanel('checking', '', liveEnrichedCount);
    await tryESPNEnrich(SLATE_ISO); // MLB.com runs inside
    const conf = liveGames.filter(g=>g.awayLineup?.length||g.homeLineup?.length).length;
    liveEnrichedCount = conf;
    const {rows} = buildRowsFixed(liveGames);
    allRows = rows;
    const label = conf > 0
      ? `MLB.com · ${liveGames.length} games · ${conf} confirmed`
      : `Built-in · ${liveGames.length} games · lineups pending`;
    setApiStatus(conf > 0 ? 'live' : 'stale', label);
    document.getElementById('last-updated').textContent =
      `Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    updateRefreshPanel(conf > 0 ? 'live' : 'stale', 'mlb', conf);
    if (currentView === 'game') renderGameView(); else filt();
    updateRefreshBtn(false);
  }, REFRESH_INTERVAL_MS);

  // Progress bar and countdown update every second
  startProgressBar();
}

  const platTag = r.pitcher ? (bh!==r.pitcher.hand ? `<span class="tag tg">Platoon ✓</span>` : `<span class="tag tr">Same hand</span>`) : '';
  const roofTag = r.park.roof==='open' ? `<span class="tag tt">Open air</span>` : r.park.roof==='retractable' ? `<span class="tag ta">Retractable</span>` : `<span class="tag tgr">Dome</span>`;
  const wTag = r.wx.l==='blowing out' ? `<span class="tag tg">${r.wx.l}</span>` : r.wx.l==='blowing in' ? `<span class="tag tr">${r.wx.l}</span>` : r.wx.l==='dome' ? `<span class="tag tgr">dome</span>` : `<span class="tag ta">${r.wx.l}</span>`;
  let arHTML = '';
  if (r.pitcher?.arsenal?.length) {
    arHTML = r.pitcher.arsenal.map(a => {
      const sf=(SP[a.type]||{})[bh]||1;
      const tag=sf>1.02?`<span class="tag tb" style="font-size:9px;padding:1px 3px">HR+</span>`:sf<0.98?`<span class="tag tr" style="font-size:9px;padding:1px 3px">HR−</span>`:`<span class="tag tgr" style="font-size:9px;padding:1px 3px">Neu</span>`;
      return `<div class="ar-row"><span class="ar-name">${a.type}</span><div class="ar-bg"><div class="ar-fill" style="width:${a.usage}%"></div></div><span class="ar-val">${a.usage}% · ${a.whiff||'?'}% K ${tag}</span></div>`;
    }).join('');
  }
  return `<div class="di">
    <div>
      <div class="dl">Probability factors</div>
      <div style="margin-bottom:7px">${roofTag} <span class="tag tb" style="font-size:10px">Elev ${r.park.elev?.toLocaleString()}ft</span></div>
      <div class="wx-strip">
        <div class="wc"><div class="wv">${r.wx.t}°F</div><div class="wl">${r.wx.s}</div></div>
        <div class="wc"><div class="wv">${r.wx.w}mph</div><div class="wl">${r.wx.c} ${wTag}</div></div>
        <div class="wc"><div class="wv">${r.wx.h}%</div><div class="wl">Humidity</div></div>
      </div>
      <div class="fr"><span class="fn">Player base (brl ${r.barrel}% · EV ${r.ev})</span><span class="fp">+${r.base}%</span></div>
      <div class="fr"><span class="fn">Wind</span><span class="${W(r.wF).cls}">${W(r.wF).lbl}</span></div>
      <div class="fr"><span class="fn">Temperature</span><span class="${W(r.tF).cls}">${W(r.tF).lbl}</span></div>
      <div class="fr"><span class="fn">Altitude (${r.park.elev?.toLocaleString()}ft)</span><span class="${W(r.aF).cls}">${W(r.aF).lbl}</span></div>
      <div class="fr"><span class="fn">Park dimensions (×${r.park.dim})</span><span class="${W(r.dF).cls}">${W(r.dF).lbl}</span></div>
      ${r.park.roof!=='open'?`<div class="fr"><span class="fn">Roof</span><span class="${W(r.rF).cls}">${W(r.rF).lbl}</span></div>`:''}
      ${r.pitcher?`
      <div class="fr"><span class="fn">Pitcher HR/9 (${r.pitcher.hr9?.toFixed(2)||'?'})</span><span class="${W(r.hr9F).cls}">${W(r.hr9F).lbl}</span></div>
      <div class="fr"><span class="fn">Pitcher difficulty</span><span class="${W(r.pF).cls}">${W(r.pF).lbl}</span></div>
      <div class="fr"><span class="fn">Platoon ${platTag}</span><span class="${W(r.plF).cls}">${W(r.plF).lbl}</span></div>
      <div class="fr"><span class="fn">Arsenal vs ${bh}HB</span><span class="${W(r.arF).cls}">${W(r.arF).lbl}</span></div>`:''}
      <div class="fr"><span class="fn">🔥 Hot bat · ${r.hrL10!=null?r.hrL10+' HR/L10':'n/a'}${r.hotStreak?` · <span style="color:var(--amber)">🔥</span>`:r.hbF<-0.2?` · <span style="color:var(--red)">❄️</span>`:''}</span><span class="${W(r.hbF).cls}">${W(r.hbF).lbl}</span></div>
      ${r.hotNote?`<div style="font-size:10px;color:var(--amber);margin:2px 0 5px;font-family:var(--fm)">${r.hotStreak?'🔥':r.hbF<-0.2?'❄️':'📊'} ${r.hotNote}</div>`:''}
      <div class="ft"><span class="ftl">Total HR prob / PA</span><span class="ftv">${r.pct}%</span></div>
    </div>
    <div>
      <div class="dl">Batter profile</div>
      <div style="margin-bottom:7px;display:flex;gap:5px;flex-wrap:wrap">
        ${isoBadge(r.iso)}
        ${(r.source==='live'||r.source==='confirmed')?`<span class="confirmed-badge">✅ Confirmed</span>`:r.source==='baked'?`<span style="background:rgba(237,137,54,.15);color:#ed8936;border:1px solid rgba(237,137,54,.35);border-radius:3px;font-size:9px;font-weight:700;padding:2px 5px;font-family:var(--fm)">⏳ Pre-loaded</span>`:''}
        ${r.hrSzn!=null?`<span class="tag tb">${r.hrSzn}HR szn</span>`:''}
      </div>
      ${arHTML?`<div class="dl" style="margin-top:7px">Arsenal vs ${bh}HB</div>${arHTML}`:''}
      <div style="margin-top:9px;font-size:10px;color:var(--t3);font-family:var(--fm)">${r.game.awayTeamName} @ ${r.game.homeTeamName} · ${r.timeStr}<br>ISO ${r.iso?.toFixed(3)||'—'} · Barrel ${r.barrel}% · EV ${r.ev}mph · HH ${r.hh}%</div>
    </div>
  </div>`;
}

function renderTable(rows) {
  const liveCount = allRows.filter(r=>r.source==='live').length;
  const bakedCount = allRows.filter(r=>r.source==='baked').length;
  const totalCount = allRows.length;
  document.getElementById('rc').innerHTML =
    `${rows.length} batters · ${SLATE_STR} · ${liveCount>0?`<span style="color:var(--teal)">✅ ${liveCount} live confirmed</span> · `:''}${bakedCount>0?`<span style="color:#ed8936">⏳ ${bakedCount} pre-loaded</span> · `:''} Auto-refresh every 5min`;

  const tb = document.getElementById('tb');
  if (!rows.length) { tb.innerHTML=`<tr><td colspan="9" class="emp">No results</td></tr>`; return; }
  renderSumm(rows);

  let html='', lastG='';
  rows.forEach((r,i) => {
    if (r.game.gamePk !== lastG) {
      const awP = enrichPitcher(r.game.awayProbable);
      const hmP = enrichPitcher(r.game.homeProbable);
      const gameRows = allRows.filter(x => x.game.gamePk === r.game.gamePk);
      const hasConfirmed = r.game.awayLineup?.length || r.game.homeLineup?.length;
      const lineupStatus = hasConfirmed
        ? `<span style="color:var(--teal);margin-left:6px">✅ lineups confirmed</span>`
        : `<span style="color:var(--amber);margin-left:6px">☐ projected lineup</span>`;
      html+=`<tr class="gh"><td colspan="9">${r.game.awayTeamName} @ ${r.game.homeTeamName} · ${r.timeStr} · ${r.park.n} · ${r.wx.t}°F ${r.wx.s}${lineupStatus}</td></tr>`;
      lastG = r.game.gamePk;
    }
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const bw=Math.min(100,(r.pct/25)*100).toFixed(0);
    const bc=r.pct>=16?'fh':r.pct>=10?'fm2':'fl';
    const platoon=r.pitcher&&r.bats!=='S'
      ?(r.bats!==r.pitcher.hand?`<span class="tag tg" style="font-size:10px">Plat✓</span>`:`<span class="tag tr" style="font-size:10px">Same</span>`):'';
    const wTag=r.wx.l==='blowing out'?`<span class="tag tg" style="font-size:10px">Out</span>`:r.wx.l==='blowing in'?`<span class="tag tr" style="font-size:10px">In</span>`:r.wx.l==='dome'?`<span class="tag tgr" style="font-size:10px">Dome</span>`:`<span class="tag ta" style="font-size:10px">Cross</span>`;
    const vDot=r.verified?`<span style="color:var(--teal);font-size:10px">✅</span> `:`<span style="color:var(--t3);font-size:10px">☐</span> `;
    const hotBadge=r.hotStreak?`<span class="tag ta" style="font-size:9px;padding:1px 3px;margin-left:2px">🔥</span>`:r.hbF<-0.2?`<span class="tag tr" style="font-size:9px;padding:1px 3px;margin-left:2px">❄️</span>`:'';
    const l10=r.hrL10!=null?`<span style="font-size:10px;color:var(--t3);margin-left:3px">${r.hrL10}/L10</span>`:'';

    html+=`<tr id="tr${i}" onclick="tog(${i})">
      <td style="vertical-align:middle;width:28px"><div class="rk ${rc}">${i+1}</div></td>
      <td class="nc" style="min-width:130px;max-width:200px">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:nowrap">
          ${vDot}<b style="font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${r.name}</b>${hotBadge}
        </div>
        <div style="font-size:10px;color:var(--t3);font-family:var(--fm);margin-top:1px;white-space:nowrap">${r.bats}HB · #${r.order}${r.hrSzn!=null?' · '+r.hrSzn+'HR':''}${r.iso!=null?' · ISO '+r.iso.toFixed(3):''}</div>
      </td>
      <td style="font-size:12px;font-weight:700;vertical-align:middle;white-space:nowrap">${r.team}</td>
      <td style="min-width:140px">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">${platoon}<span style="font-size:11px;color:var(--t2);white-space:nowrap">vs ${r.pitcher?.name||'TBD'}</span></div>
        <div style="display:flex;align-items:center;gap:3px">${hr9Badge(r.pitcher?.hr9)}<span style="font-size:10px;color:var(--t3);font-family:var(--fm)">${r.pitcher?.hand||'?'}HP</span></div>
      </td>
      <td style="min-width:120px">
        <div style="font-size:11px;color:var(--t2);white-space:nowrap">${r.park.n}</div>
        <div style="font-size:10px;color:var(--t3);font-family:var(--fm);margin-top:1px">${r.timeStr}</div>
      </td>
      <td style="min-width:90px">
        <div style="font-size:12px;white-space:nowrap">${r.wx.t}°F ${wTag}</div>
        <div style="font-size:10px;color:var(--t3);font-family:var(--fm);margin-top:1px">${r.wx.w}mph</div>
      </td>
      <td class="pw" style="vertical-align:middle"><div class="pn">${r.pct}%</div><div class="pb"><div class="pf ${bc}" style="width:${bw}%"></div></div></td>
      <td style="font-family:var(--fm);font-size:12px;vertical-align:middle;white-space:nowrap">${r.barrel}%</td>
      <td style="font-family:var(--fm);font-size:12px;vertical-align:middle;white-space:nowrap">${r.ev}</td>
    </tr>
    <tr class="dr" id="dr${i}" style="display:none"><td colspan="9">${detailHTML(r)}</td></tr>`;
  });
  tb.innerHTML = html;
}

function tog(i) {
  const dr=document.getElementById('dr'+i), tr=document.getElementById('tr'+i);
  const open=dr.style.display!=='none';
  document.querySelectorAll('[id^="dr"]').forEach(e=>e.style.display='none');
  document.querySelectorAll('tbody tr:not(.dr):not(.gh)').forEach(e=>e.classList.remove('ro'));
  if(!open){dr.style.display='';tr.classList.add('ro');}
}

function renderGameView() {
  // Rebuild rows from liveGames so confirmed lineups are always reflected
  if (liveGames.length > 0) {
    const rebuilt = buildRowsFixed(liveGames);
    allRows = rebuilt.rows;
  }
  const gv = document.getElementById('game-view');
  const byGame = {};
  allRows.forEach(r => { if(!byGame[r.game.gamePk]) byGame[r.game.gamePk]=[]; byGame[r.game.gamePk].push(r); });

  const wTagStr=wx=>wx.l==='blowing out'?`<span class="tag tg" style="font-size:10px">Out</span>`:wx.l==='blowing in'?`<span class="tag tr" style="font-size:10px">In</span>`:wx.l==='dome'?`<span class="tag tgr" style="font-size:10px">Dome</span>`:`<span class="tag ta" style="font-size:10px">Cross</span>`;

  let html = `<div class="gv-wrap"><div class="games-grid">`;

  liveGames.forEach(g => {
    const park = PARKS[g.homeTeamName] || PARKS[g.homeTeamName.replace(/\s+/g,'')] || PARKS["Yankees"];
    const wx   = getWx(park);
    const rows = (byGame[g.gamePk]||[]).sort((a,b)=>b.pct-a.pct);
    const awayRows = rows.filter(r=>r.team===g.awayTeamName).sort((a,b)=>b.pct-a.pct);
    const homeRows = rows.filter(r=>r.team===g.homeTeamName).sort((a,b)=>b.pct-a.pct);
    const top3 = rows.slice(0,3);
    const avg = rows.length ? +(rows.reduce((s,r)=>s+r.pct,0)/rows.length).toFixed(1) : 0;
    const awP = enrichPitcher(g.awayProbable);
    const hmP = enrichPitcher(g.homeProbable);
    const lineupPosted = g.awayLineup?.length || g.homeLineup?.length;
    const isLiveConfirmed = [...(g.awayLineup||[]),...(g.homeLineup||[])].some(p=>p.source==='live'||p.source==='confirmed');
    const roofTag = park.roof==='open'?`<span class="tag tt" style="font-size:10px">Open</span>`:park.roof==='retractable'?`<span class="tag ta" style="font-size:10px">Retractable</span>`:`<span class="tag tgr" style="font-size:10px">Dome</span>`;
    const statusBadge = !lineupPosted
      ? `<span class="projected-badge">⏳ Pending</span>`
      : isLiveConfirmed
        ? `<span class="confirmed-badge">✅ Live</span>`
        : `<span style="background:rgba(237,137,54,.15);color:#ed8936;border:1px solid rgba(237,137,54,.35);border-radius:3px;font-size:9px;font-weight:700;padding:2px 5px;font-family:var(--fm)">⏳ Pre-loaded</span>`;

    const topHTML = top3.map((r,i) => {
      const rc=i===0?'r1':i===1?'r2':'r3';
      const bw=Math.min(100,(r.pct/25)*100).toFixed(0);
      return `<div class="threat-row" onclick="jumpToPlayer('${r.name}')">
        <div class="threat-rk ${rc}">${i+1}</div>
        <div><div class="threat-name">${r.hotStreak?'🔥':r.hbF<-0.2?'❄️':''} ${r.name}</div>
        <div class="threat-meta">${r.team} · ${r.bats}HB${r.hrL10!=null?' · '+r.hrL10+'/L10':''}</div></div>
        <div class="tbar"><div class="tbar-f" style="width:${bw}%"></div></div>
        <div class="threat-pct">${r.pct}%</div>
      </div>`;
    }).join('');

    const lineupHTML = (teamRows, pitHand) => teamRows.map(r => {
      const bw=Math.min(100,(r.pct/25)*100).toFixed(0);
      const bc=r.pct>=16?'fh':r.pct>=10?'fm2':'fl';
      const plat=r.bats!==pitHand&&r.bats!=='S'
        ?`<span class="tag tg" style="font-size:9px;padding:1px 3px">Plat✓</span>`
        :`<span class="tag tr" style="font-size:9px;padding:1px 3px">Same</span>`;
      return `<div class="mini-row" onclick="jumpToPlayer('${r.name}')">
        <span class="mini-ord">${r.order}</span>
        <span style="color:var(--t3);font-size:9px">${(r.source==='live'||r.source==='confirmed')?'✅':'⏳'}</span>
        <span class="mini-name">${r.hotStreak?'🔥':''} ${r.name}</span>
        <div class="mini-badges">${plat}${isoBadge(r.iso)}</div>
        <div class="mbar"><div class="mbar-f ${bc}" style="width:${bw}%"></div></div>
        <span class="mini-pct">${r.pct}%</span>
      </div>`;
    }).join('');

    html += `<div class="gcard">
      <div class="gcard-hdr">
        <div>
          <div class="gcard-matchup">${g.awayTeamName} <span style="color:var(--t3);font-weight:400">@</span> ${g.homeTeamName}</div>
          <div class="gcard-meta">${park.n} · ${park.city} · ${park.elev?.toLocaleString()}ft ${roofTag} ${statusBadge}</div>
        </div>
        <div class="gcard-time">${g.time||'TBD'}</div>
      </div>
      <div class="gcard-wx">
        <span>${wx.t}°F ${wx.s}</span> · <span>${wx.w}mph</span> ${wTagStr(wx)} · <span>Humidity ${wx.h}%</span>
        ${wx.t<=40?`<span style="color:var(--red);font-weight:700;margin-left:4px">⚠️ Suppressor</span>`:''}
      </div>
      <div class="gcard-pitchers">
        <div class="p-side">
          <div class="p-team">${g.awayTeamName} SP</div>
          <div class="p-name">${awP?.name||'TBD'}</div>
          <div class="p-stats">${awP?.hand||'?'}HP · ${awP?.era||'?'} ERA${awP?.xera?' · '+awP.xera+' xERA':''}</div>
          <div class="p-badges">${hr9Badge(awP?.hr9)}</div>
        </div>
        <div class="p-side">
          <div class="p-team">${g.homeTeamName} SP</div>
          <div class="p-name">${hmP?.name||'TBD'}</div>
          <div class="p-stats">${hmP?.hand||'?'}HP · ${hmP?.era||'?'} ERA${hmP?.xera?' · '+hmP.xera+' xERA':''}</div>
          <div class="p-badges">${hr9Badge(hmP?.hr9)}</div>
        </div>
      </div>
      <div class="gcard-threats">
        <div class="threat-lbl">${topHTML ? 'Top HR Threats' : 'Matchup Preview'}</div>
        ${topHTML || (() => {
          const parkFactor = park.dim > 1.05 ? `<span class="tag tg" style="font-size:10px;padding:2px 6px">Hitter-friendly +${((park.dim-1)*100).toFixed(0)}%</span>` :
                            park.dim < 0.97 ? `<span class="tag tr" style="font-size:10px;padding:2px 6px">Pitcher-friendly ${((park.dim-1)*100).toFixed(0)}%</span>` :
                            `<span class="tag ta" style="font-size:10px;padding:2px 6px">Neutral park</span>`;
          const elevFactor = park.elev > 2000 ? `<span class="tag tg" style="font-size:10px;padding:2px 6px">High altitude ↑HR</span>` : '';
          const wxFactor = wx.l==='blowing out' ? `<span class="tag tg" style="font-size:10px;padding:2px 6px">Wind: Blowing out +HR</span>` :
                          wx.l==='blowing in'  ? `<span class="tag tr" style="font-size:10px;padding:2px 6px">Wind: Blowing in −HR</span>` :
                          wx.l==='dome'        ? `<span class="tag tgr" style="font-size:10px;padding:2px 6px">Dome — no wx</span>` :
                          `<span class="tag ta" style="font-size:10px;padding:2px 6px">Wind: Crosswind</span>`;
          const tempFactor = wx.t >= 80 ? `<span class="tag tg" style="font-size:10px;padding:2px 6px">${wx.t}°F ↑HR</span>` :
                            wx.t <= 50 ? `<span class="tag tr" style="font-size:10px;padding:2px 6px">${wx.t}°F ↓HR</span>` :
                            `<span class="tag ta" style="font-size:10px;padding:2px 6px">${wx.t}°F</span>`;
          const awayHR = awP?.hr9 >= 1.5 ? `<span class="tag tr" style="font-size:10px;padding:2px 6px">💣 ${awP.name} HR-prone</span>` :
                        awP?.hr9 <= 0.9 ? `<span class="tag tgr" style="font-size:10px;padding:2px 6px">🔒 ${awP.name} suppressor</span>` : '';
          const homeHR = hmP?.hr9 >= 1.5 ? `<span class="tag tr" style="font-size:10px;padding:2px 6px">💣 ${hmP.name} HR-prone</span>` :
                        hmP?.hr9 <= 0.9 ? `<span class="tag tgr" style="font-size:10px;padding:2px 6px">🔒 ${hmP.name} suppressor</span>` : '';
          return `<div style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0">
            ${parkFactor}${elevFactor}${wxFactor}${tempFactor}${awayHR}${homeHR}
          </div>
          <div style="color:var(--t3);font-size:11px;font-family:var(--fm);margin-top:6px">⏳ Lineups post ~3hrs before first pitch</div>`;
        })()}
      </div>
      <div class="gcard-footer">
        <span class="gcard-avg">Avg: <b style="color:var(--t1)">${avg}%</b> · ${rows.length} batters</span>
        <button class="exp-btn" onclick="toggleExp(${g.gamePk},this)">Full lineups ↓</button>
      </div>
      <div class="gcard-exp" id="ge-${g.gamePk}" style="display:none">
        <div class="exp-tl">${g.awayTeamName} vs ${hmP?.name||'TBD'} (${hmP?.hand||'?'}HP)</div>
        ${awayRows.length ? lineupHTML(awayRows,hmP?.hand||'R') : `<div style="padding:6px 0;color:var(--t2);font-size:12px;font-family:var(--fm)">
          <div style="margin-bottom:4px">${hmP?.name||'TBD'} · ${hmP?.hand||'?'}HP · ${hmP?.era||'—'} ERA${hmP?.xera?' · '+hmP.xera+' xERA':''}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">${(hmP?.arsenal||[]).slice(0,3).map(a=>`<span class="tag ta" style="font-size:10px">${a.type} ${a.usage}% whiff:${a.whiff}%</span>`).join('')}</div>
          <div style="color:var(--t3);font-size:11px;margin-top:5px">⏳ Lineup not yet confirmed</div>
        </div>`}
        <div class="sdiv"></div>
        <div class="exp-tl">${g.homeTeamName} vs ${awP?.name||'TBD'} (${awP?.hand||'?'}HP)</div>
        ${homeRows.length ? lineupHTML(homeRows,awP?.hand||'R') : `<div style="padding:6px 0;color:var(--t2);font-size:12px;font-family:var(--fm)">
          <div style="margin-bottom:4px">${awP?.name||'TBD'} · ${awP?.hand||'?'}HP · ${awP?.era||'—'} ERA${awP?.xera?' · '+awP.xera+' xERA':''}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">${(awP?.arsenal||[]).slice(0,3).map(a=>`<span class="tag ta" style="font-size:10px">${a.type} ${a.usage}% whiff:${a.whiff}%</span>`).join('')}</div>
          <div style="color:var(--t3);font-size:11px;margin-top:5px">⏳ Lineup not yet confirmed</div>
        </div>`}
        <div style="font-size:10px;color:var(--t3);font-family:var(--fm);margin-top:7px;padding-top:5px;border-top:1px solid var(--b1)">Click player to jump to Player view · Auto-refreshes every 5min</div>
      </div>
    </div>`;
  });

  html += `</div><div style="font-size:11px;color:var(--t3);font-family:var(--fm);margin-top:10px;padding:0 2px">💣 HR/9 ≥1.5 = HR-prone · 🔒 HR/9 &lt;1.0 = suppressor · ISO = Isolated Power (SLG−AVG) · Lineups auto-update every 5 minutes</div></div>`;
  gv.innerHTML = html;
}

function toggleExp(pk,btn) {
  const el=document.getElementById('ge-'+pk);
  const open=el.style.display!=='none';
  el.style.display=open?'none':'';
  btn.textContent=open?'Full lineups ↓':'Collapse ↑';
}
function jumpToPlayer(name) {
  setView('player', document.getElementById('vbtn-player'));
  document.getElementById('search').value = name;
  filt();
  setTimeout(()=>{const f=document.querySelector('tbody tr:not(.gh)');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},80);
